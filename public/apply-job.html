<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <meta name="description" content="Apply for a job on MGZon">

    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">

            max-width: 800px;

            overflow: hidden;
        }
        body.dark .form-card { background: #1f2937; border: 1px solid #374151; }

        body.dark .form-section { border-bottom-color: #374151; }

            background: #0c4a6e;

            background: #0a66c2;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-primary:hover { background: #004182; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        body.dark .btn-secondary { background: #374151; color: #f3f4f6; }
        .btn-secondary:hover { transform: translateY(-1px); filter: brightness(0.95); }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            background: white;
            border-radius: 9999px;
            text-decoration: none;
            color: #1f2937;
            font-size: 0.875rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);

        .file-upload {

        .skeleton {

            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.5rem;
        }
        body.dark .skeleton {
            background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .toastify { border-radius: 0.75rem !important; font-family: 'Inter', sans-serif !important; }

</head>

<main class="main-container">

<script src="/assets/js/config.js"></script>

<script>
// ============================================
// APPLY FOR JOB PAGE - Fully Updated
// ============================================

const API_URL = window.ENV?.API_URL || 'https://misty-dust-988c.marklasfar.workers.dev';
const cleanApiUrl = API_URL.replace(/\/$/, '');
let userToken = localStorage.getItem('userToken');
let currentUser = null;
let currentJob = null;
let jobId = null;
let isLoggedIn = !!userToken;
let isSubmitting = false;

// ============================================
// Utility Functions
// ============================================

function showToast(message, type = 'success') {
    if (typeof Toastify !== 'undefined') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: 'top',
            position: 'right',
            style: {
                background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6',
                borderRadius: '12px',
                fontFamily: 'Inter, sans-serif'
            }
        }).showToast();
    } else {
        console.log(message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function formatDate(date) {
    if (!date) return 'N/A';
    const d = new Date(date);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function formatSalary(min, max, currency, isNegotiable) {
    if (isNegotiable) return 'Negotiable';
    if (min && max) return `${formatNumber(min)} - ${formatNumber(max)} ${currency}`;
    if (min) return `From ${formatNumber(min)} ${currency}`;
    if (max) return `Up to ${formatNumber(max)} ${currency}`;
    return 'Not specified';
}

function formatNumber(num) {
    if (num >= 1000000) return `${(num / 1000000).toFixed(1)}M`;
    if (num >= 1000) return `${(num / 1000).toFixed(0)}K`;
    return num.toString();
}

async function fetchCsrfToken() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
            method: 'GET', 
            credentials: 'include' 
        });
        const data = await response.json();
        return data.csrfToken;
    } catch (error) {
        console.error('Error fetching CSRF token:', error);
        return null;
    }
}

async function fetchWithRefresh(url, options = {}) {
    try {
        let csrfToken = await fetchCsrfToken();
        options.headers = {
            ...options.headers,
            'Authorization': userToken ? `Bearer ${userToken}` : '',
            'X-CSRF-Token': csrfToken || ''
        };
        let response = await fetch(url, { ...options, credentials: 'include' });
        
        if (response.status === 401 && userToken) {
            const refreshed = await refreshToken();
            if (refreshed) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
                response = await fetch(url, options);
            }
        }
        return response;
    } catch (error) {
        console.error('Fetch error:', error);
        throw error;
    }
}

async function refreshToken() {
    try {
        const refreshToken = localStorage.getItem('refreshToken');
        if (!refreshToken) throw new Error('No refresh token');
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/refresh-token`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ refreshToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error('Refresh failed');
        localStorage.setItem('userToken', data.accessToken || data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        userToken = data.accessToken || data.token;
        return userToken;
    } catch (error) {
        console.error('Refresh error:', error);
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        userToken = null;
        return null;
    }
}

// ============================================
// Load Site Settings
// ============================================
async function loadSiteSettings() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/site-settings`);
        if (response.ok) {
            const data = await response.json();
            const logoImg = document.querySelector('#nav-logo');
            if (logoImg && data.logo) {
                logoImg.src = data.logo;
                logoImg.onerror = () => logoImg.src = '/assets/img/logo.svg';
            }
            const siteNameSpan = document.getElementById('site-name');
            if (siteNameSpan && data.siteName) {
                siteNameSpan.textContent = data.siteName;
            }
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon && data.logo) {
                favicon.href = data.logo;
            }
        }
    } catch (error) {
        console.error('Error loading site settings:', error);
    }
}

// ============================================
// Load Current User & Navbar
// ============================================
async function loadCurrentUser() {
    if (!userToken) {
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/verify-token`);
        if (response.ok) {
            currentUser = await response.json();
            isLoggedIn = true;
            await updateNavbar();
            
            // Pre-fill form with user data
            if (currentUser) {
                document.getElementById('full-name').value = currentUser.profile?.nickname || '';
                document.getElementById('email').value = currentUser.email || '';
                document.getElementById('phone').value = currentUser.profile?.phone || '';
            }
            
            return currentUser;
        }
        isLoggedIn = false;
        await updateNavbar();
        return null;
    } catch (error) {
        console.error('Error loading current user:', error);
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
}

async function updateNavbar() {
    const navbarContainer = document.getElementById('navbar-links');
    if (!navbarContainer) return;
    
    if (!isLoggedIn) {
        navbarContainer.innerHTML = `
            <a href="/login.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition px-3 py-2">Sign in</a>
            <a href="/register.html" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">Join now</a>
            <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
                <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
            </button>
        `;
        return;
    }
    
    const userAvatarSrc = currentUser?.profile?.avatar || '/assets/img/default-avatar.png';
    
    navbarContainer.innerHTML = `
        <a href="/feed.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-home text-2xl'></i></a>
        <a href="/network.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-group text-2xl'></i></a>
        <a href="/jobs.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-briefcase text-2xl'></i></a>
        <a href="/messages.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-message-dots text-2xl'></i></a>
        <div class="relative">
            <button id="profile-menu-btn" class="flex items-center gap-1 text-gray-600 dark:text-gray-300">
                <img src="${userAvatarSrc}" class="w-8 h-8 rounded-full object-cover">
                <i class='bx bx-chevron-down text-xl'></i>
            </button>
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg z-50 overflow-hidden">
                <a href="/profile/me" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                <a href="/settings.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Settings</a>
                <a href="/my-jobs.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Jobs</a>
                <a href="/job-applications.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Applications</a>
                <hr class="my-1 dark:border-gray-700">
                <button id="logout-btn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-red-600 transition">Sign Out</button>
            </div>
        </div>
        <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
            <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
        </button>
    `;
    
    attachNavbarEvents();
}

function attachNavbarEvents() {
    const profileMenuBtn = document.getElementById('profile-menu-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    if (profileMenuBtn && profileDropdown) {
        profileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });
    }
    
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    document.addEventListener('click', () => {
        if (profileDropdown) profileDropdown.classList.add('hidden');
    });
}

async function handleLogout() {
    try {
        const csrfToken = await fetchCsrfToken();
        await fetch(`${cleanApiUrl}/api/logout`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ============================================
// Load Job Details
// ============================================
async function loadJobDetails() {
    const jobInfoDiv = document.getElementById('job-info');
    
    try {
        const response = await fetch(`${cleanApiUrl}/api/jobs/${jobId}`, {
            headers: userToken ? { 'Authorization': `Bearer ${userToken}` } : {}
        });
        
        if (!response.ok) {
            throw new Error('Job not found');
        }
        
        const result = await response.json();
        currentJob = result.data;
        
        // Check if already applied
        if (currentJob.hasApplied) {
            showToast('You have already applied for this job', 'warning');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="bx bx-check-circle"></i> Already Applied';
            document.getElementById('submit-btn').classList.add('opacity-50', 'cursor-not-allowed');
        }
        
        // Check if job is closed
        if (currentJob.status !== 'active' || new Date(currentJob.deadline) < new Date()) {
            showToast('This job is no longer accepting applications', 'warning');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="bx bx-time"></i> Job Closed';
            document.getElementById('submit-btn').classList.add('opacity-50', 'cursor-not-allowed');
        }
        
        // Display job info
        const salaryText = formatSalary(currentJob.salaryMin, currentJob.salaryMax, currentJob.salaryCurrency, currentJob.isSalaryNegotiable);
        
        jobInfoDiv.innerHTML = `
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h2 class="font-bold text-lg">${escapeHtml(currentJob.title)}</h2>
                    <p class="text-sm text-gray-600 dark:text-gray-300 mt-1">${escapeHtml(currentJob.companyName || currentJob.employerId?.profile?.nickname || 'Company')}</p>
                    <div class="flex flex-wrap gap-3 mt-2 text-xs text-gray-500">
                        <span><i class='bx bx-map'></i> ${currentJob.isRemote ? 'Remote' : escapeHtml(currentJob.location)}</span>
                        <span><i class='bx bx-dollar-circle'></i> ${salaryText}</span>
                        <span><i class='bx bx-calendar'></i> Deadline: ${formatDate(currentJob.deadline)}</span>
                    </div>
                </div>
                <a href="/job-details.html?id=${jobId}" class="btn-secondary">
                    <i class='bx bx-show'></i> View Full Details
                </a>
            </div>
        `;
        
    } catch (error) {
        console.error('Error loading job:', error);
        jobInfoDiv.innerHTML = `
            <div class="text-center py-4">
                <i class='bx bx-error-circle text-3xl text-red-500 mb-2'></i>
                <p class="text-gray-500">${error.message}</p>
                <a href="/jobs.html" class="text-blue-500 text-sm mt-2 inline-block">Back to Jobs</a>
            </div>
        `;
        document.getElementById('submit-btn').disabled = true;
    }
}

// ============================================
// File Upload Handler
// ============================================
function setupFileUpload() {
    const resumeUpload = document.getElementById('resume-upload');
    const resumeInput = document.getElementById('resume');
    const resumeName = document.getElementById('resume-name');
    
    resumeUpload.addEventListener('click', () => {
        resumeInput.click();
    });
    
    resumeUpload.addEventListener('dragover', (e) => {
        e.preventDefault();
        resumeUpload.classList.add('border-blue-500', 'bg-blue-50');
        body.dark?.resumeUpload?.classList.add('border-blue-400', 'bg-blue-900/20');
    });
    
    resumeUpload.addEventListener('dragleave', (e) => {
        e.preventDefault();
        resumeUpload.classList.remove('border-blue-500', 'bg-blue-50');
        body.dark?.resumeUpload?.classList.remove('border-blue-400', 'bg-blue-900/20');
    });
    
    resumeUpload.addEventListener('drop', (e) => {
        e.preventDefault();
        resumeUpload.classList.remove('border-blue-500', 'bg-blue-50');
        body.dark?.resumeUpload?.classList.remove('border-blue-400', 'bg-blue-900/20');
        
        const file = e.dataTransfer.files[0];
        if (file && (file.type === 'application/pdf' || file.type === 'application/msword' || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document')) {
            resumeInput.files = e.dataTransfer.files;
            resumeName.textContent = file.name;
            resumeName.classList.remove('hidden');
        } else {
            showToast('Please upload a PDF or Word document', 'error');
        }
    });
    
    resumeInput.addEventListener('change', () => {
        if (resumeInput.files.length > 0) {
            resumeName.textContent = resumeInput.files[0].name;
            resumeName.classList.remove('hidden');
        } else {
            resumeName.classList.add('hidden');
        }
    });
}

// ============================================
// Submit Application
// ============================================
async function submitApplication(e) {
    e.preventDefault();
    
    if (!isLoggedIn) {
        showToast('Please login to apply for jobs', 'warning');
        window.location.href = `/login.html?redirect=/apply-job.html?id=${jobId}`;
        return;
    }
    
    if (isSubmitting) return;
    
    const fullName = document.getElementById('full-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const resumeFile = document.getElementById('resume').files[0];
    
    if (!fullName) {
        showToast('Please enter your full name', 'error');
        return;
    }
    
    if (!email) {
        showToast('Please enter your email address', 'error');
        return;
    }
    
    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
        showToast('Please enter a valid email address', 'error');
        return;
    }
    
    if (!resumeFile) {
        showToast('Please upload your resume/CV', 'error');
        return;
    }
    
    isSubmitting = true;
    const submitBtn = document.getElementById('submit-btn');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> Submitting...';
    submitBtn.disabled = true;
    
    const formData = new FormData();
    formData.append('fullName', fullName);
    formData.append('email', email);
    formData.append('phone', document.getElementById('phone').value.trim() || '');
    formData.append('coverLetter', document.getElementById('cover-letter').value.trim() || '');
    formData.append('portfolio', document.getElementById('portfolio').value.trim() || '');
    formData.append('linkedin', document.getElementById('linkedin').value.trim() || '');
    formData.append('github', document.getElementById('github').value.trim() || '');
    
    if (resumeFile) {
        formData.append('resume', resumeFile);
    }
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/${jobId}/apply`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: formData
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showToast('Application submitted successfully!', 'success');
            submitBtn.innerHTML = '<i class="bx bx-check-circle"></i> Application Submitted';
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            setTimeout(() => {
                window.location.href = '/job-applications.html';
            }, 2000);
        } else {
            throw new Error(result.error || result.message || 'Failed to submit application');
        }
    } catch (error) {
        console.error('Error submitting application:', error);
        showToast(error.message, 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        isSubmitting = false;
    }
}

// ============================================
// Theme Toggle
// ============================================
function setupThemeToggle() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const modeToggle = document.getElementById('modeToggle');
            if (modeToggle) {
                modeToggle.src = isDark ? '/assets/img/theme_dark.png' : '/assets/img/theme_light.png';
            }
        });
    }
}

// ============================================
// Initialize
// ============================================
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    jobId = urlParams.get('id');
    
    if (!jobId) {
        window.location.href = '/jobs.html';
        return;
    }
    
    await loadSiteSettings();
    await loadCurrentUser();
    await loadJobDetails();
    setupFileUpload();
    setupThemeToggle();
    
    document.getElementById('application-form').addEventListener('submit', submitApplication);
}

init();
</script>
