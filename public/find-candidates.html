<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find top talent for your company. Access qualified candidates actively seeking opportunities.">
    <title>Find Candidates - MGZon for Employers</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" id="dynamic-favicon" href="/assets/img/logo.svg">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .feature-card { transition: all 0.3s ease; }
        .feature-card:hover { transform: translateY(-5px); }
        .dark { background: #1a1a2e; }
        .dark .bg-white { background-color: #1f2937 !important; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white dark:bg-gray-800 shadow-lg fixed top-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="flex items-center gap-2"><img id="nav-logo" src="/assets/img/logo.svg" class="h-8 w-8"><span id="site-name" class="text-xl font-bold gradient-text">MGZon</span></a>
        <div class="flex gap-3" id="auth-buttons">
            <a href="/login.html" class="px-4 py-2 text-purple-600 font-semibold">Sign In</a>
            <a href="/register.html" class="px-5 py-2 gradient-bg text-white rounded-full font-semibold">Post a Job</a>
        </div>
    </div>
</nav>

<section class="pt-28 pb-16 px-4">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Find Top <span class="gradient-text">Talent</span></h1>
        <p class="text-xl text-gray-600 mb-8">Access a pool of qualified candidates actively seeking opportunities</p>
        <div class="grid md:grid-cols-3 gap-6 mt-12">
            <div class="feature-card p-6 bg-white dark:bg-gray-800 rounded-2xl shadow"><i class='bx bx-search-alt text-4xl text-purple-600 mb-3'></i><h3 class="font-bold text-lg">Smart Search</h3><p class="text-gray-500 text-sm">Filter by skills, experience, location</p></div>
            <div class="feature-card p-6 bg-white dark:bg-gray-800 rounded-2xl shadow"><i class='bx bx-message-dots text-4xl text-purple-600 mb-3'></i><h3 class="font-bold text-lg">Direct Contact</h3><p class="text-gray-500 text-sm">Message candidates directly</p></div>
            <div class="feature-card p-6 bg-white dark:bg-gray-800 rounded-2xl shadow"><i class='bx bx-stats text-4xl text-purple-600 mb-3'></i><h3 class="font-bold text-lg">Analytics</h3><p class="text-gray-500 text-sm">Track your hiring metrics</p></div>
        </div>
        <a href="/register.html" class="inline-block mt-8 gradient-bg text-white px-8 py-3 rounded-full font-semibold hover:shadow-lg transition">Get Started</a>
    </div>
</section>

<footer class="bg-gray-900 text-white py-8 text-center"><p>&copy; <span id="current-year"></span> MGZon. All rights reserved.</p></footer>

<script src="/assets/js/config.js"></script>
<script>
    const API_URL = window.ENV?.API_URL || 'https://mgzon-server.hf.space';
    const cleanApiUrl = API_URL.replace(/\/$/, '');
    let userToken = localStorage.getItem('userToken');
    async function loadSiteSettings() {
        try {
            const response = await fetch(`${cleanApiUrl}/api/site-settings`);
            if (response.ok) {
                const data = await response.json();
                const logoImg = document.querySelector('#nav-logo');
                if (logoImg && data.logo) logoImg.src = data.logo;
                const siteNameSpan = document.getElementById('site-name');
                if (siteNameSpan && data.siteName) siteNameSpan.textContent = data.siteName;
            }
        } catch (error) { console.error(error); }
    }
    function updateNav() {
        const authButtons = document.getElementById('auth-buttons');
        if (userToken) {
            authButtons.innerHTML = `<a href="/feed.html" class="px-4 py-2 text-purple-600 font-semibold">Feed</a><a href="/profile/me" class="px-5 py-2 gradient-bg text-white rounded-full font-semibold">Profile</a>`;
        }
    }
    document.getElementById('current-year').textContent = new Date().getFullYear();
    loadSiteSettings();
    updateNav();
</script>
</body>
</html>
