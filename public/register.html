<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MGZon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="glass-card p-8 max-w-md w-full mx-4">
        <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>
        
        <div id="register-form">
            <div class="mb-4">
                <input type="text" id="username" placeholder="Username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>
            <div class="mb-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>
            <div class="mb-4 relative">
                <input type="password" id="password" placeholder="Password (8+ characters)" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                <button type="button" id="toggle-password" class="absolute inset-y-0 right-2 flex items-center text-gray-500">
                    <i class='bx bx-show'></i>
                </button>
            </div>
            <button id="register-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-2 rounded-lg hover:opacity-90 transition">Create Account</button>
            <p class="text-center text-sm mt-3">Already have an account? <a href="/login.html" class="text-purple-500 hover:underline">Login</a></p>
        </div>

        <p id="register-error" class="text-red-500 text-center text-sm mt-3 hidden"></p>
    </div>

    <script src="/assets/js/config.js"></script>
    <script>
        const API_URL = window.ENV.API_URL;
        const cleanApiUrl = API_URL.replace(/\/$/, '');
        
        function showToast(message, type = 'success') {
            Toastify({ text: message, duration: 3000, style: { background: type === 'success' ? '#10b981' : '#ef4444' } }).showToast();
        }

        async function fetchCsrfToken() {
            try {
                const response = await fetch(`${cleanApiUrl}/api/csrf-token`, {
                    method: 'GET', credentials: 'include'
                });
                const data = await response.json();
                return data.csrfToken;
            } catch (error) {
                console.error('CSRF error:', error);
                return null;
            }
        }

        // Toggle password visibility
        document.getElementById('toggle-password')?.addEventListener('click', () => {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('#toggle-password i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bx-show');
                icon.classList.add('bx-hide');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bx-hide');
                icon.classList.add('bx-show');
            }
        });

        async function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('register-error');
            const registerBtn = document.getElementById('register-btn');
            
            if (!username || !email || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorEl.textContent = 'Please enter a valid email address';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.classList.remove('hidden');
                return;
            }
            
            errorEl.classList.add('hidden');
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';
            
            try {
                const csrfToken = await fetchCsrfToken();
                const response = await fetch(`${cleanApiUrl}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken || '' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.status === 201 && data.requiresVerification) {
                    sessionStorage.setItem('pendingVerificationEmail', email);
                    showToast('Account created! Please verify your email.', 'success');
                    setTimeout(() => {
                        window.location.href = `/verify-otp.html?email=${encodeURIComponent(email)}`;
                    }, 1500);
                } 
                else if (response.ok && data.token) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    showToast('Registration successful! Redirecting...');
                    setTimeout(() => { window.location.href = '/profile/me'; }, 1500);
                }
                else {
                    errorEl.textContent = data.error || 'Registration failed';
                    errorEl.classList.remove('hidden');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            } catch (error) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.remove('hidden');
                console.error(error);
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        }
        
        document.getElementById('register-btn')?.addEventListener('click', handleRegister);
        
        // Check if already logged in
        if (localStorage.getItem('userToken')) {
            window.location.href = '/profile/me';
        }
    </script>
</body>
</html>
