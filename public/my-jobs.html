<script>
// ============================================
// MY JOBS PAGE - Fully Updated
// ============================================

const API_URL = window.ENV?.API_URL || 'https://misty-dust-988c.marklasfar.workers.dev';
const cleanApiUrl = API_URL.replace(/\/$/, '');
let userToken = localStorage.getItem('userToken');
let currentUser = null;
let currentTab = 'active';
let currentPage = 1;
let isLoading = false;
let hasMore = true;
let jobToDelete = null;
let isLoggedIn = !!userToken;

// Observer for infinite scroll
const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoading && hasMore && currentTab !== 'applications') {
        loadJobs();
    }
}, { threshold: 0.1 });

// ============================================
// Utility Functions
// ============================================

function showToast(message, type = 'success') {
    if (typeof Toastify !== 'undefined') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: 'top',
            position: 'right',
            style: {
                background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6',
                borderRadius: '12px',
                fontFamily: 'Inter, sans-serif'
            }
        }).showToast();
    } else {
        console.log(message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function formatDate(date) {
    if (!date) return 'N/A';
    const d = new Date(date);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

async function fetchCsrfToken() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
            method: 'GET', 
            credentials: 'include' 
        });
        const data = await response.json();
        return data.csrfToken;
    } catch (error) {
        console.error('Error fetching CSRF token:', error);
        return null;
    }
}

async function fetchWithRefresh(url, options = {}) {
    try {
        let csrfToken = await fetchCsrfToken();
        options.headers = {
            ...options.headers,
            'Authorization': userToken ? `Bearer ${userToken}` : '',
            'X-CSRF-Token': csrfToken || ''
        };
        let response = await fetch(url, { ...options, credentials: 'include' });
        
        if (response.status === 401 && userToken) {
            const refreshed = await refreshToken();
            if (refreshed) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
                response = await fetch(url, options);
            }
        }
        return response;
    } catch (error) {
        console.error('Fetch error:', error);
        throw error;
    }
}

async function refreshToken() {
    try {
        const refreshToken = localStorage.getItem('refreshToken');
        if (!refreshToken) throw new Error('No refresh token');
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/refresh-token`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ refreshToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error('Refresh failed');
        localStorage.setItem('userToken', data.accessToken || data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        userToken = data.accessToken || data.token;
        return userToken;
    } catch (error) {
        console.error('Refresh error:', error);
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        userToken = null;
        return null;
    }
}

// ============================================
// Load Site Settings
// ============================================
async function loadSiteSettings() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/site-settings`);
        if (response.ok) {
            const data = await response.json();
            const logoImg = document.querySelector('#nav-logo');
            if (logoImg && data.logo) {
                logoImg.src = data.logo;
                logoImg.onerror = () => logoImg.src = '/assets/img/logo.svg';
            }
            const siteNameSpan = document.getElementById('site-name');
            if (siteNameSpan && data.siteName) {
                siteNameSpan.textContent = data.siteName;
            }
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon && data.logo) {
                favicon.href = data.logo;
            }
        }
    } catch (error) {
        console.error('Error loading site settings:', error);
    }
}

// ============================================
// Load Current User & Navbar
// ============================================
async function loadCurrentUser() {
    if (!userToken) {
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/verify-token`);
        if (response.ok) {
            currentUser = await response.json();
            isLoggedIn = true;
            await updateNavbar();
            return currentUser;
        }
        isLoggedIn = false;
        await updateNavbar();
        return null;
    } catch (error) {
        console.error('Error loading current user:', error);
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
}

async function updateNavbar() {
    const navbarContainer = document.getElementById('navbar-links');
    if (!navbarContainer) return;
    
    if (!isLoggedIn) {
        navbarContainer.innerHTML = `
            <a href="/login.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition px-3 py-2">Sign in</a>
            <a href="/register.html" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">Join now</a>
            <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
                <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
            </button>
        `;
        return;
    }
    
    const userAvatarSrc = currentUser?.profile?.avatar || '/assets/img/default-avatar.png';
    
    navbarContainer.innerHTML = `
        <a href="/feed.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-home text-2xl'></i></a>
        <a href="/network.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-group text-2xl'></i></a>
        <a href="/jobs.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-briefcase text-2xl'></i></a>
        <a href="/messages.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-message-dots text-2xl'></i></a>
        <div class="relative">
            <button id="profile-menu-btn" class="flex items-center gap-1 text-gray-600 dark:text-gray-300">
                <img src="${userAvatarSrc}" class="w-8 h-8 rounded-full object-cover">
                <i class='bx bx-chevron-down text-xl'></i>
            </button>
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg z-50 overflow-hidden">
                <a href="/profile/me" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                <a href="/settings.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Settings</a>
                <a href="/my-jobs.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Jobs</a>
                <a href="/job-applications.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Applications</a>
                <hr class="my-1 dark:border-gray-700">
                <button id="logout-btn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-red-600 transition">Sign Out</button>
            </div>
        </div>
        <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
            <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
        </button>
    `;
    
    attachNavbarEvents();
}

function attachNavbarEvents() {
    const profileMenuBtn = document.getElementById('profile-menu-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    if (profileMenuBtn && profileDropdown) {
        profileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });
    }
    
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    document.addEventListener('click', () => {
        if (profileDropdown) profileDropdown.classList.add('hidden');
    });
}

async function handleLogout() {
    try {
        const csrfToken = await fetchCsrfToken();
        await fetch(`${cleanApiUrl}/api/logout`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ============================================
// Load Stats
// ============================================
async function loadStats() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/jobs/my`, {
            headers: { 'Authorization': `Bearer ${userToken}` }
        });
        const result = await response.json();
        
        if (response.ok) {
            const jobs = result.data;
            const activeJobs = jobs.filter(j => j.status === 'active' && new Date(j.deadline) > new Date());
            const totalApplications = jobs.reduce((sum, j) => sum + (j.applicationsCount || 0), 0);
            const pendingApplications = jobs.reduce((sum, j) => sum + (j.pendingCount || 0), 0);
            
            document.getElementById('total-jobs').textContent = jobs.length;
            document.getElementById('active-jobs').textContent = activeJobs.length;
            document.getElementById('total-applications').textContent = totalApplications;
            document.getElementById('pending-applications').textContent = pendingApplications;
        }
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

// ============================================
// Load Jobs/Applications
// ============================================
async function loadJobs() {
    if (isLoading) return;
    isLoading = true;
    
    try {
        let url;
        if (currentTab === 'applications') {
            url = `${cleanApiUrl}/api/jobs/my/applications?page=${currentPage}&limit=20`;
        } else {
            let status = '';
            if (currentTab === 'active') status = 'active';
            url = `${cleanApiUrl}/api/jobs/my?page=${currentPage}&limit=10${status ? `&status=${status}` : ''}`;
        }
        
        const response = await fetchWithRefresh(url);
        const result = await response.json();
        
        if (!response.ok) throw new Error(result.error);
        
        const container = document.getElementById('jobs-container');
        
        if (currentPage === 1) {
            container.innerHTML = '';
        }
        
        if (result.data.length === 0 && currentPage === 1) {
            if (currentTab === 'applications') {
                container.innerHTML = `
                    <div class="text-center py-12 bg-white dark:bg-gray-800 rounded-lg">
                        <i class='bx bx-group text-6xl text-gray-400 mb-3'></i>
                        <h3 class="text-lg font-semibold mb-2">No applications yet</h3>
                        <p class="text-gray-500">When candidates apply, you'll see them here</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="text-center py-12 bg-white dark:bg-gray-800 rounded-lg">
                        <i class='bx bx-briefcase text-6xl text-gray-400 mb-3'></i>
                        <h3 class="text-lg font-semibold mb-2">No jobs posted yet</h3>
                        <p class="text-gray-500 mb-4">Post your first job to start receiving applications</p>
                        <a href="/post-job.html" class="inline-block px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                            Post a Job
                        </a>
                    </div>
                `;
            }
            hasMore = false;
            return;
        }
        
        if (currentTab === 'applications') {
            result.data.forEach(application => {
                container.appendChild(createApplicationCard(application));
            });
        } else {
            result.data.forEach(job => {
                container.appendChild(createJobCard(job));
            });
        }
        
        hasMore = result.data.length === (currentTab === 'applications' ? 20 : 10);
        if (hasMore) currentPage++;
        
    } catch (error) {
        console.error('Error loading data:', error);
        showToast('Failed to load data', 'error');
    } finally {
        isLoading = false;
    }
}

// ============================================
// Create Job Card
// ============================================
function createJobCard(job) {
    const div = document.createElement('div');
    div.className = 'job-item p-5 cursor-pointer';
    
    const statusClass = `status-${job.status}`;
    const statusText = {
        'active': 'Active',
        'paused': 'Paused',
        'closed': 'Closed',
        'expired': 'Expired'
    }[job.status] || job.status;
    
    const isExpired = new Date(job.deadline) < new Date();
    const deadlineClass = isExpired ? 'text-red-500' : 'text-gray-500';
    
    div.innerHTML = `
        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
            <div class="flex-1">
                <div class="flex items-center gap-3 flex-wrap mb-2">
                    <h3 class="text-lg font-semibold hover:text-blue-500">${escapeHtml(job.title)}</h3>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    ${job.isFeatured ? '<span class="bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 text-xs px-2 py-1 rounded-full">⭐ Featured</span>' : ''}
                </div>
                <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">${escapeHtml(job.companyName || 'Your Company')}</p>
                <div class="flex flex-wrap gap-3 text-sm text-gray-500 mb-3">
                    <span><i class='bx bx-map'></i> ${job.isRemote ? 'Remote' : job.location}</span>
                    <span><i class='bx bx-calendar'></i> Deadline: <span class="${deadlineClass}">${formatDate(job.deadline)}</span></span>
                    <span><i class='bx bx-group'></i> ${job.applicationsCount || 0} applicants</span>
                    <span><i class='bx bx-show'></i> ${job.views || 0} views</span>
                </div>
                <div class="flex flex-wrap gap-2 mt-3">
                    <button class="btn-secondary" onclick="viewApplications('${job._id}', event)">
                        <i class='bx bx-group'></i> Applications (${job.applicationsCount || 0})
                    </button>
                    <button class="btn-secondary" onclick="editJob('${job._id}', event)">
                        <i class='bx bx-edit-alt'></i> Edit
                    </button>
                    <button class="btn-secondary" onclick="duplicateJob('${job._id}', event)">
                        <i class='bx bx-copy'></i> Duplicate
                    </button>
                    <button class="btn-danger" onclick="deleteJobPrompt('${job._id}', event)">
                        <i class='bx bx-trash'></i> Delete
                    </button>
                </div>
            </div>
        </div>
    `;
    
    div.addEventListener('click', (e) => {
        if (!e.target.closest('button')) {
            window.location.href = `/job-details.html?id=${job._id}`;
        }
    });
    
    return div;
}

// ============================================
// Create Application Card
// ============================================
function createApplicationCard(application) {
    const div = document.createElement('div');
    div.className = 'job-item p-5 cursor-pointer';
    
    const statusColors = {
        'pending': 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400',
        'reviewed': 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400',
        'shortlisted': 'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400',
        'interview': 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400',
        'accepted': 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400',
        'rejected': 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400'
    };
    
    div.innerHTML = `
        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
            <div class="flex-1">
                <div class="flex items-center gap-3 flex-wrap mb-2">
                    <h3 class="text-lg font-semibold">${escapeHtml(application.fullName)}</h3>
                    <span class="status-badge ${statusColors[application.status]}">${application.status}</span>
                </div>
                <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">
                    Applied for: <span class="font-medium">${escapeHtml(application.jobId?.title || 'Job')}</span>
                </p>
                <div class="flex flex-wrap gap-3 text-sm text-gray-500 mb-3">
                    <span><i class='bx bx-envelope'></i> ${escapeHtml(application.email)}</span>
                    ${application.phone ? `<span><i class='bx bx-phone'></i> ${escapeHtml(application.phone)}</span>` : ''}
                    <span><i class='bx bx-calendar'></i> Applied: ${formatDate(application.appliedAt)}</span>
                </div>
                <div class="flex flex-wrap gap-2 mt-3">
                    <button class="btn-secondary" onclick="viewApplicationDetails('${application._id}', event)">
                        <i class='bx bx-show'></i> View Details
                    </button>
                    <button class="btn-secondary" onclick="updateApplicationStatus('${application._id}', 'shortlisted', event)">
                        <i class='bx bx-star'></i> Shortlist
                    </button>
                    <button class="btn-secondary" onclick="updateApplicationStatus('${application._id}', 'interview', event)">
                        <i class='bx bx-calendar'></i> Interview
                    </button>
                    ${application.resume?.url ? `
                        <a href="${application.resume.url}" target="_blank" class="btn-secondary" onclick="event.stopPropagation()">
                            <i class='bx bx-file'></i> Resume
                        </a>
                    ` : ''}
                </div>
                ${application.employerNotes ? `
                    <div class="mt-3 p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                        <p class="text-sm text-gray-600 dark:text-gray-400">
                            <span class="font-semibold">Your note:</span> ${escapeHtml(application.employerNotes)}
                        </p>
                    </div>
                ` : ''}
            </div>
        </div>
    `;
    
    div.addEventListener('click', (e) => {
        if (!e.target.closest('button') && !e.target.closest('a')) {
            window.location.href = `/application-details.html?id=${application._id}`;
        }
    });
    
    return div;
}

// ============================================
// Application Actions
// ============================================
async function updateApplicationStatus(applicationId, status, event) {
    if (event) event.stopPropagation();
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${applicationId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ status })
        });
        
        if (response.ok) {
            showToast(`Application ${status} successfully!`, 'success');
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error updating status:', error);
        showToast(error.message, 'error');
    }
}

// ============================================
// Job Actions
// ============================================
function deleteJobPrompt(jobId, event) {
    if (event) event.stopPropagation();
    jobToDelete = jobId;
    const modal = document.getElementById('delete-modal');
    modal.classList.add('show');
}

function closeDeleteModal() {
    const modal = document.getElementById('delete-modal');
    modal.classList.remove('show');
    jobToDelete = null;
}

async function confirmDeleteJob() {
    if (!jobToDelete) return;
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/${jobToDelete}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        
        if (response.ok) {
            showToast('Job deleted successfully', 'success');
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error deleting job:', error);
        showToast(error.message, 'error');
    } finally {
        closeDeleteModal();
    }
}

async function duplicateJob(jobId, event) {
    if (event) event.stopPropagation();
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/${jobId}/duplicate`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        
        if (response.ok) {
            showToast('Job duplicated successfully!', 'success');
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error duplicating job:', error);
        showToast(error.message, 'error');
    }
}

// ============================================
// Navigation Functions
// ============================================
function viewJob(jobId) {
    window.location.href = `/job-details.html?id=${jobId}`;
}

function viewApplications(jobId, event) {
    if (event) event.stopPropagation();
    window.location.href = `/job-applications.html?jobId=${jobId}`;
}

function editJob(jobId, event) {
    if (event) event.stopPropagation();
    window.location.href = `/edit-job.html?id=${jobId}`;
}

function viewApplicationDetails(applicationId, event) {
    if (event) event.stopPropagation();
    window.location.href = `/application-details.html?id=${applicationId}`;
}

function resetAndReload() {
    currentPage = 1;
    hasMore = true;
    loadStats();
    loadJobs();
}

// ============================================
// Setup Event Listeners
// ============================================
function setupEventListeners() {
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            if (tab === currentTab) return;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentTab = tab;
            currentPage = 1;
            hasMore = true;
            loadJobs();
        });
    });
    
    // Delete modal
    document.getElementById('confirm-delete')?.addEventListener('click', confirmDeleteJob);
    document.getElementById('cancel-delete')?.addEventListener('click', closeDeleteModal);
    document.querySelectorAll('.close-delete-modal').forEach(btn => {
        btn.addEventListener('click', closeDeleteModal);
    });
    
    // Close modal on overlay click
    const deleteModal = document.getElementById('delete-modal');
    if (deleteModal) {
        deleteModal.addEventListener('click', (e) => {
            if (e.target === deleteModal) closeDeleteModal();
        });
    }
}

// ============================================
// Theme Toggle
// ============================================
function setupThemeToggle() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const modeToggle = document.getElementById('modeToggle');
            if (modeToggle) {
                modeToggle.src = isDark ? '/assets/img/theme_dark.png' : '/assets/img/theme_light.png';
            }
        });
    }
}

// ============================================
// Initialize
// ============================================
async function init() {
    if (!userToken) {
        window.location.href = '/login.html?redirect=/my-jobs.html';
        return;
    }
    
    await loadSiteSettings();
    await loadCurrentUser();
    await loadStats();
    await loadJobs();
    setupEventListeners();
    setupThemeToggle();
    
    const trigger = document.getElementById('load-more-trigger');
    if (trigger) observer.observe(trigger);
}

// Make functions global
window.viewJob = viewJob;
window.viewApplications = viewApplications;
window.editJob = editJob;
window.viewApplicationDetails = viewApplicationDetails;
window.updateApplicationStatus = updateApplicationStatus;
window.deleteJobPrompt = deleteJobPrompt;
window.duplicateJob = duplicateJob;

init();
</script>
