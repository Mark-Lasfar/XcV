<script src="/assets/js/config.js"></script>

<script>
// ============================================
// APPLICATION DETAILS PAGE (Employer View) - Fully Updated
// ============================================

const API_URL = window.ENV?.API_URL || 'https://mgzon-server.hf.space';
const cleanApiUrl = API_URL.replace(/\/$/, '');
let userToken = localStorage.getItem('userToken');
let currentUser = null;
let applicationData = null;
let applicationId = null;
let isLoggedIn = !!userToken;

// ============================================
// Utility Functions
// ============================================

function showToast(message, type = 'success') {
    if (typeof Toastify !== 'undefined') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: 'top',
            position: 'right',
            style: {
                background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6',
                borderRadius: '12px',
                fontFamily: 'Inter, sans-serif'
            }
        }).showToast();
    } else {
        console.log(message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function formatDate(date) {
    if (!date) return 'N/A';
    const d = new Date(date);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

async function fetchCsrfToken() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
            method: 'GET', 
            credentials: 'include' 
        });
        const data = await response.json();
        return data.csrfToken;
    } catch (error) {
        console.error('Error fetching CSRF token:', error);
        return null;
    }
}

async function fetchWithRefresh(url, options = {}) {
    try {
        let csrfToken = await fetchCsrfToken();
        options.headers = {
            ...options.headers,
            'Authorization': userToken ? `Bearer ${userToken}` : '',
            'X-CSRF-Token': csrfToken || ''
        };
        let response = await fetch(url, { ...options, credentials: 'include' });
        
        if (response.status === 401 && userToken) {
            const refreshed = await refreshToken();
            if (refreshed) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
                response = await fetch(url, options);
            }
        }
        return response;
    } catch (error) {
        console.error('Fetch error:', error);
        throw error;
    }
}

async function refreshToken() {
    try {
        const refreshToken = localStorage.getItem('refreshToken');
        if (!refreshToken) throw new Error('No refresh token');
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/refresh-token`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ refreshToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error('Refresh failed');
        localStorage.setItem('userToken', data.accessToken || data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        userToken = data.accessToken || data.token;
        return userToken;
    } catch (error) {
        console.error('Refresh error:', error);
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        userToken = null;
        return null;
    }
}

// ============================================
// Load Site Settings
// ============================================
async function loadSiteSettings() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/site-settings`);
        if (response.ok) {
            const data = await response.json();
            const logoImg = document.querySelector('#nav-logo');
            if (logoImg && data.logo) {
                logoImg.src = data.logo;
                logoImg.onerror = () => logoImg.src = '/assets/img/logo.svg';
            }
            const siteNameSpan = document.getElementById('site-name');
            if (siteNameSpan && data.siteName) {
                siteNameSpan.textContent = data.siteName;
            }
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon && data.logo) {
                favicon.href = data.logo;
            }
        }
    } catch (error) {
        console.error('Error loading site settings:', error);
    }
}

// ============================================
// Load Current User & Navbar
// ============================================
async function loadCurrentUser() {
    if (!userToken) {
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/verify-token`);
        if (response.ok) {
            currentUser = await response.json();
            isLoggedIn = true;
            await updateNavbar();
            return currentUser;
        }
        isLoggedIn = false;
        await updateNavbar();
        return null;
    } catch (error) {
        console.error('Error loading current user:', error);
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
}

async function updateNavbar() {
    const navbarContainer = document.getElementById('navbar-links');
    if (!navbarContainer) return;
    
    if (!isLoggedIn) {
        navbarContainer.innerHTML = `
            <a href="/login.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition px-3 py-2">Sign in</a>
            <a href="/register.html" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">Join now</a>
            <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
                <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
            </button>
        `;
        return;
    }
    
    const userAvatarSrc = currentUser?.profile?.avatar || '/assets/img/default-avatar.png';
    
    navbarContainer.innerHTML = `
        <a href="/feed.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-home text-2xl'></i></a>
        <a href="/network.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-group text-2xl'></i></a>
        <a href="/jobs.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-briefcase text-2xl'></i></a>
        <a href="/messages.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-message-dots text-2xl'></i></a>
        <div class="relative">
            <button id="profile-menu-btn" class="flex items-center gap-1 text-gray-600 dark:text-gray-300">
                <img src="${userAvatarSrc}" class="w-8 h-8 rounded-full object-cover">
                <i class='bx bx-chevron-down text-xl'></i>
            </button>
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg z-50 overflow-hidden">
                <a href="/profile/me" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                <a href="/settings.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Settings</a>
                <a href="/my-jobs.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Jobs</a>
                <a href="/job-applications.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Applications</a>
                <hr class="my-1 dark:border-gray-700">
                <button id="logout-btn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-red-600 transition">Sign Out</button>
            </div>
        </div>
        <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
            <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
        </button>
    `;
    
    attachNavbarEvents();
}

function attachNavbarEvents() {
    const profileMenuBtn = document.getElementById('profile-menu-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    if (profileMenuBtn && profileDropdown) {
        profileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });
    }
    
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    document.addEventListener('click', () => {
        if (profileDropdown) profileDropdown.classList.add('hidden');
    });
}

async function handleLogout() {
    try {
        const csrfToken = await fetchCsrfToken();
        await fetch(`${cleanApiUrl}/api/logout`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ============================================
// Load Application Details
// ============================================
async function loadApplication() {
    const container = document.getElementById('application-container');
    
    if (!applicationId) {
        container.innerHTML = `
            <div class="card p-8 text-center">
                <i class='bx bx-error-circle text-5xl text-gray-400 mb-3'></i>
                <p class="text-gray-500">Application not found</p>
                <a href="/my-jobs.html" class="inline-block mt-3 text-blue-500 hover:text-blue-600">Back to My Jobs</a>
            </div>
        `;
        return;
    }
    
    container.innerHTML = '<div class="skeleton" style="height: 400px;"></div>';
    
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/jobs/applications/${applicationId}`);
        
        if (!response.ok) {
            if (response.status === 403) {
                throw new Error('You do not have permission to view this application');
            }
            throw new Error('Application not found');
        }
        
        const result = await response.json();
        applicationData = result.data || result;
        renderApplication(applicationData);
        
    } catch (error) {
        console.error('Error loading application:', error);
        container.innerHTML = `
            <div class="card p-8 text-center">
                <i class='bx bx-error-circle text-5xl text-gray-400 mb-3'></i>
                <p class="text-gray-500">${error.message}</p>
                <a href="/my-jobs.html" class="inline-block mt-3 text-blue-500 hover:text-blue-600">Back to My Jobs</a>
            </div>
        `;
    }
}

function renderApplication(app) {
    const container = document.getElementById('application-container');
    const job = app.jobId || {};
    const applicant = app.applicantId || {};
    
    const statusClasses = {
        pending: 'status-pending',
        reviewed: 'status-reviewed',
        shortlisted: 'status-shortlisted',
        interview: 'status-interview',
        accepted: 'status-accepted',
        rejected: 'status-rejected'
    };
    
    const statusNames = {
        pending: 'Pending Review',
        reviewed: 'Reviewed',
        shortlisted: 'Shortlisted',
        interview: 'Interview',
        accepted: 'Accepted',
        rejected: 'Rejected'
    };
    
    container.innerHTML = `
        <div class="card">
            <div class="card-header">
                <span>Application Details</span>
                <div class="flex gap-2">
                    <span class="status-badge ${statusClasses[app.status] || 'status-pending'}">
                        ${statusNames[app.status] || app.status?.toUpperCase() || 'PENDING'}
                    </span>
                    ${app.status === 'pending' ? `
                        <select id="status-select" class="text-sm border rounded-lg px-2 py-1 dark:bg-gray-700">
                            <option value="reviewed">Mark as Reviewed</option>
                            <option value="shortlisted">Shortlist</option>
                            <option value="interview">Schedule Interview</option>
                            <option value="accepted">Accept</option>
                            <option value="rejected">Reject</option>
                        </select>
                        <button onclick="updateStatusFromSelect()" class="btn-primary !py-1 !px-3 text-sm">Update</button>
                    ` : ''}
                </div>
            </div>
            <div class="card-content space-y-4">
                <!-- Job Information -->
                <div>
                    <h3 class="font-bold text-lg">${escapeHtml(job.title || 'Job Position')}</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm">${escapeHtml(job.companyName || 'Company')}</p>
                </div>
                
                <!-- Applicant Information -->
                <div class="border-t dark:border-gray-700 pt-3">
                    <h4 class="font-semibold mb-3 flex items-center gap-2">
                        <i class='bx bx-user'></i> Applicant Information
                    </h4>
                    <div class="space-y-2">
                        <div class="info-row">
                            <span class="info-label">Full Name</span>
                            <span class="info-value">${escapeHtml(app.fullName)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email</span>
                            <span class="info-value">${escapeHtml(app.email)}</span>
                        </div>
                        ${app.phone ? `
                            <div class="info-row">
                                <span class="info-label">Phone</span>
                                <span class="info-value">${escapeHtml(app.phone)}</span>
                            </div>
                        ` : ''}
                        <div class="info-row">
                            <span class="info-label">Applied on</span>
                            <span class="info-value">${formatDate(app.appliedAt)}</span>
                        </div>
                    </div>
                </div>
                
                <!-- Applicant Profile (if available) -->
                ${applicant._id ? `
                    <div class="border-t dark:border-gray-700 pt-3">
                        <h4 class="font-semibold mb-3 flex items-center gap-2">
                            <i class='bx bx-id-card'></i> Applicant Profile
                        </h4>
                        <div class="flex items-center gap-3">
                            <img src="${applicant.profile?.avatar || '/assets/img/default-avatar.png'}" class="w-12 h-12 rounded-full object-cover">
                            <div>
                                <a href="/profile/${applicant.profile?.nickname || applicant.username}" class="font-semibold hover:text-blue-500">
                                    ${escapeHtml(applicant.profile?.nickname || applicant.username)}
                                </a>
                                <p class="text-sm text-gray-500">${escapeHtml(applicant.profile?.jobTitle || 'Professional')}</p>
                            </div>
                        </div>
                        ${applicant.profile?.bio ? `
                            <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">${escapeHtml(applicant.profile.bio.substring(0, 200))}${applicant.profile.bio.length > 200 ? '...' : ''}</p>
                        ` : ''}
                    </div>
                ` : ''}
                
                <!-- Cover Letter -->
                ${app.coverLetter ? `
                    <div class="border-t dark:border-gray-700 pt-3">
                        <h4 class="font-semibold mb-2 flex items-center gap-2">
                            <i class='bx bx-envelope'></i> Cover Letter
                        </h4>
                        <div class="text-sm whitespace-pre-wrap bg-gray-50 dark:bg-gray-800 p-3 rounded-lg">
                            ${escapeHtml(app.coverLetter)}
                        </div>
                    </div>
                ` : ''}
                
                <!-- Links & Documents -->
                <div class="border-t dark:border-gray-700 pt-3">
                    <h4 class="font-semibold mb-2 flex items-center gap-2">
                        <i class='bx bx-link-alt'></i> Links & Documents
                    </h4>
                    <div class="flex flex-wrap gap-3">
                        ${app.resume?.url ? `
                            <a href="${app.resume.url}" target="_blank" class="btn-secondary">
                                <i class='bx bx-file'></i> View Resume
                            </a>
                        ` : ''}
                        ${app.portfolio ? `
                            <a href="${app.portfolio}" target="_blank" class="btn-secondary">
                                <i class='bx bx-globe'></i> Portfolio
                            </a>
                        ` : ''}
                        ${app.linkedin ? `
                            <a href="${app.linkedin}" target="_blank" class="btn-secondary">
                                <i class='bx bxl-linkedin'></i> LinkedIn
                            </a>
                        ` : ''}
                        ${app.github ? `
                            <a href="${app.github}" target="_blank" class="btn-secondary">
                                <i class='bx bxl-github'></i> GitHub
                            </a>
                        ` : ''}
                    </div>
                </div>
                
                <!-- Employer Note -->
                <div class="border-t dark:border-gray-700 pt-3">
                    <h4 class="font-semibold mb-2 flex items-center gap-2">
                        <i class='bx bx-note'></i> Your Note
                    </h4>
                    <div class="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-lg">
                        ${app.employerNotes ? `
                            <p class="text-sm">${escapeHtml(app.employerNotes)}</p>
                            <button onclick="openNoteModal('${app._id}', '${escapeHtml(app.employerNotes).replace(/'/g, "\\'")}')" class="text-xs text-blue-500 mt-2">Edit Note</button>
                        ` : `
                            <p class="text-sm text-gray-500">No notes added yet</p>
                            <button onclick="openNoteModal('${app._id}', '')" class="text-xs text-blue-500 mt-2">Add Note</button>
                        `}
                    </div>
                </div>
                
                <!-- Interviews Section -->
                ${app.interviews && app.interviews.length > 0 ? `
                    <div class="border-t dark:border-gray-700 pt-3">
                        <h4 class="font-semibold mb-2 flex items-center gap-2">
                            <i class='bx bx-calendar-event'></i> Interview History
                        </h4>
                        <div class="space-y-2">
                            ${app.interviews.map(interview => `
                                <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg">
                                    <div class="flex justify-between items-start flex-wrap gap-2">
                                        <div>
                                            <p class="font-medium text-sm">${interview.type?.toUpperCase() || 'Interview'}</p>
                                            <p class="text-xs text-gray-500">${formatDate(interview.scheduledAt)}</p>
                                        </div>
                                        <span class="text-xs px-2 py-1 rounded-full bg-${interview.status === 'scheduled' ? 'yellow' : interview.status === 'completed' ? 'green' : 'red'}-100 text-${interview.status === 'scheduled' ? 'yellow' : interview.status === 'completed' ? 'green' : 'red'}-800">
                                            ${interview.status || 'Scheduled'}
                                        </span>
                                    </div>
                                    ${interview.meetingLink ? `
                                        <a href="${interview.meetingLink}" target="_blank" class="text-xs text-blue-500 hover:underline mt-1 inline-block">
                                            <i class='bx bx-link-external'></i> Join Meeting
                                        </a>
                                    ` : ''}
                                    ${interview.notes ? `<p class="text-xs text-gray-500 mt-1">${escapeHtml(interview.notes)}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                <div class="flex gap-3 pt-3">
                    <button onclick="openInterviewModal('${app._id}')" class="btn-primary flex-1">
                        <i class='bx bx-calendar'></i> Schedule Interview
                    </button>
                    <a href="/job-details.html?id=${job._id}" class="btn-secondary flex-1 text-center">
                        <i class='bx bx-briefcase'></i> View Job
                    </a>
                </div>
            </div>
        </div>
    `;
}

// ============================================
// Application Actions
// ============================================
async function updateStatus(applicationId, status) {
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${applicationId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ status })
        });
        
        if (response.ok) {
            showToast(`Application ${status} successfully!`, 'success');
            await loadApplication();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error updating status:', error);
        showToast(error.message, 'error');
    }
}

async function updateStatusFromSelect() {
    const select = document.getElementById('status-select');
    if (select) {
        const status = select.value;
        if (status === 'interview') {
            openInterviewModal(applicationId);
        } else {
            await updateStatus(applicationId, status);
        }
    }
}

async function updateNote(applicationId, note) {
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${applicationId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ employerNotes: note })
        });
        
        if (response.ok) {
            showToast('Note saved successfully!', 'success');
            await loadApplication();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error saving note:', error);
        showToast(error.message, 'error');
    }
}

// ============================================
// Interview Functions
// ============================================
function openInterviewModal(appId) {
    const modal = document.getElementById('interview-modal');
    modal.classList.add('show');
    
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(10, 0, 0, 0);
    document.getElementById('interview-datetime').value = tomorrow.toISOString().slice(0, 16);
    document.getElementById('interview-link').value = '';
    document.getElementById('interview-notes').value = '';
    
    window.currentInterviewAppId = appId;
}

async function scheduleInterview() {
    if (!window.currentInterviewAppId) return;
    
    const scheduledAt = document.getElementById('interview-datetime').value;
    const type = document.getElementById('interview-type').value;
    const meetingLink = document.getElementById('interview-link').value;
    const notes = document.getElementById('interview-notes').value;
    
    if (!scheduledAt) {
        showToast('Please select date and time', 'error');
        return;
    }
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${window.currentInterviewAppId}/interview`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ scheduledAt, type, meetingLink, notes })
        });
        
        if (response.ok) {
            showToast('Interview scheduled successfully!', 'success');
            closeInterviewModal();
            await loadApplication();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error scheduling interview:', error);
        showToast(error.message, 'error');
    }
}

function closeInterviewModal() {
    const modal = document.getElementById('interview-modal');
    modal.classList.remove('show');
    window.currentInterviewAppId = null;
}

// ============================================
// Note Functions
// ============================================
function openNoteModal(appId, currentNote) {
    window.currentNoteAppId = appId;
    const modal = document.getElementById('note-modal');
    const noteText = document.getElementById('note-text');
    noteText.value = currentNote;
    modal.classList.add('show');
}

function saveNote() {
    if (!window.currentNoteAppId) return;
    
    const note = document.getElementById('note-text').value.trim();
    updateNote(window.currentNoteAppId, note);
    closeNoteModal();
}

function closeNoteModal() {
    const modal = document.getElementById('note-modal');
    modal.classList.remove('show');
    window.currentNoteAppId = null;
}

// ============================================
// Theme Toggle
// ============================================
function setupThemeToggle() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const modeToggle = document.getElementById('modeToggle');
            if (modeToggle) {
                modeToggle.src = isDark ? '/assets/img/theme_dark.png' : '/assets/img/theme_light.png';
            }
        });
    }
}

// ============================================
// Initialize
// ============================================
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    applicationId = urlParams.get('id');
    
    if (!applicationId) {
        window.location.href = '/my-jobs.html';
        return;
    }
    
    await loadSiteSettings();
    await loadCurrentUser();
    await loadApplication();
    setupThemeToggle();
    
    // Modal listeners
    document.getElementById('schedule-interview')?.addEventListener('click', scheduleInterview);
    document.getElementById('close-interview-modal')?.addEventListener('click', closeInterviewModal);
    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.addEventListener('click', closeInterviewModal);
    });
    
    document.getElementById('save-note')?.addEventListener('click', saveNote);
    document.getElementById('close-note-modal')?.addEventListener('click', closeNoteModal);
    document.querySelectorAll('.close-note-modal').forEach(btn => {
        btn.addEventListener('click', closeNoteModal);
    });
    
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        });
    });
}

// Make functions global
window.updateStatusFromSelect = updateStatusFromSelect;
window.openInterviewModal = openInterviewModal;
window.openNoteModal = openNoteModal;
window.updateStatus = updateStatus;

init();
</script>
