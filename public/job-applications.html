<script src="/assets/js/config.js"></script>

<script>
// ============================================
// JOB APPLICATIONS PAGE - Fully Updated
// ============================================

const API_URL = window.ENV?.API_URL || 'https://misty-dust-988c.marklasfar.workers.dev';
const cleanApiUrl = API_URL.replace(/\/$/, '');
let userToken = localStorage.getItem('userToken');
let currentUser = null;
let jobId = null;
let currentStatus = 'all';
let currentPage = 1;
let isLoading = false;
let hasMore = true;
let selectedApplicationId = null;
let isLoggedIn = !!userToken;

// Observer for infinite scroll
const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoading && hasMore) {
        loadApplications();
    }
}, { threshold: 0.1 });

// ============================================
// Utility Functions
// ============================================

function showToast(message, type = 'success') {
    if (typeof Toastify !== 'undefined') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: 'top',
            position: 'right',
            style: {
                background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6',
                borderRadius: '12px',
                fontFamily: 'Inter, sans-serif'
            }
        }).showToast();
    } else {
        console.log(message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function formatDate(date) {
    if (!date) return 'N/A';
    const d = new Date(date);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

async function fetchCsrfToken() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
            method: 'GET', 
            credentials: 'include' 
        });
        const data = await response.json();
        return data.csrfToken;
    } catch (error) {
        console.error('Error fetching CSRF token:', error);
        return null;
    }
}

async function fetchWithRefresh(url, options = {}) {
    try {
        let csrfToken = await fetchCsrfToken();
        options.headers = {
            ...options.headers,
            'Authorization': userToken ? `Bearer ${userToken}` : '',
            'X-CSRF-Token': csrfToken || ''
        };
        let response = await fetch(url, { ...options, credentials: 'include' });
        
        if (response.status === 401 && userToken) {
            const refreshed = await refreshToken();
            if (refreshed) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
                response = await fetch(url, options);
            }
        }
        return response;
    } catch (error) {
        console.error('Fetch error:', error);
        throw error;
    }
}

async function refreshToken() {
    try {
        const refreshToken = localStorage.getItem('refreshToken');
        if (!refreshToken) throw new Error('No refresh token');
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/refresh-token`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ refreshToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error('Refresh failed');
        localStorage.setItem('userToken', data.accessToken || data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        userToken = data.accessToken || data.token;
        return userToken;
    } catch (error) {
        console.error('Refresh error:', error);
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        userToken = null;
        return null;
    }
}

// ============================================
// Load Site Settings
// ============================================
async function loadSiteSettings() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/site-settings`);
        if (response.ok) {
            const data = await response.json();
            const logoImg = document.querySelector('#nav-logo');
            if (logoImg && data.logo) {
                logoImg.src = data.logo;
                logoImg.onerror = () => logoImg.src = '/assets/img/logo.svg';
            }
            const siteNameSpan = document.getElementById('site-name');
            if (siteNameSpan && data.siteName) {
                siteNameSpan.textContent = data.siteName;
            }
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon && data.logo) {
                favicon.href = data.logo;
            }
        }
    } catch (error) {
        console.error('Error loading site settings:', error);
    }
}

// ============================================
// Load Current User & Navbar
// ============================================
async function loadCurrentUser() {
    if (!userToken) {
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/verify-token`);
        if (response.ok) {
            currentUser = await response.json();
            isLoggedIn = true;
            await updateNavbar();
            return currentUser;
        }
        isLoggedIn = false;
        await updateNavbar();
        return null;
    } catch (error) {
        console.error('Error loading current user:', error);
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
}

async function updateNavbar() {
    const navbarContainer = document.getElementById('navbar-links');
    if (!navbarContainer) return;
    
    if (!isLoggedIn) {
        navbarContainer.innerHTML = `
            <a href="/login.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition px-3 py-2">Sign in</a>
            <a href="/register.html" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">Join now</a>
            <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
                <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
            </button>
        `;
        return;
    }
    
    const userAvatarSrc = currentUser?.profile?.avatar || '/assets/img/default-avatar.png';
    
    navbarContainer.innerHTML = `
        <a href="/feed.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-home text-2xl'></i></a>
        <a href="/network.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-group text-2xl'></i></a>
        <a href="/jobs.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-briefcase text-2xl'></i></a>
        <a href="/messages.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-message-dots text-2xl'></i></a>
        <div class="relative">
            <button id="profile-menu-btn" class="flex items-center gap-1 text-gray-600 dark:text-gray-300">
                <img src="${userAvatarSrc}" class="w-8 h-8 rounded-full object-cover">
                <i class='bx bx-chevron-down text-xl'></i>
            </button>
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg z-50 overflow-hidden">
                <a href="/profile/me" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                <a href="/settings.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Settings</a>
                <a href="/my-jobs.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Jobs</a>
                <a href="/job-applications.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Applications</a>
                <hr class="my-1 dark:border-gray-700">
                <button id="logout-btn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-red-600 transition">Sign Out</button>
            </div>
        </div>
        <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
            <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px">
        </button>
    `;
    
    attachNavbarEvents();
}

function attachNavbarEvents() {
    const profileMenuBtn = document.getElementById('profile-menu-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    if (profileMenuBtn && profileDropdown) {
        profileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });
    }
    
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    document.addEventListener('click', () => {
        if (profileDropdown) profileDropdown.classList.add('hidden');
    });
}

async function handleLogout() {
    try {
        const csrfToken = await fetchCsrfToken();
        await fetch(`${cleanApiUrl}/api/logout`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ============================================
// Load Job Info
// ============================================
async function loadJobInfo() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/jobs/${jobId}`);
        const result = await response.json();
        
        if (response.ok && result.data) {
            document.getElementById('job-title').textContent = result.data.title;
            document.getElementById('company-name').textContent = result.data.companyName || 'Company';
        }
    } catch (error) {
        console.error('Error loading job info:', error);
    }
}

// ============================================
// Load Applications
// ============================================
async function loadApplications() {
    if (isLoading) return;
    isLoading = true;
    
    try {
        let url = `${cleanApiUrl}/api/jobs/${jobId}/applications?page=${currentPage}&limit=20`;
        if (currentStatus !== 'all') {
            url += `&status=${currentStatus}`;
        }
        
        const response = await fetchWithRefresh(url);
        const result = await response.json();
        
        if (!response.ok) throw new Error(result.error);
        
        const container = document.getElementById('applications-container');
        const totalCount = document.getElementById('total-count');
        
        if (currentPage === 1) {
            container.innerHTML = '';
            totalCount.textContent = result.pagination.total;
        }
        
        if (result.data.length === 0 && currentPage === 1) {
            container.innerHTML = `
                <div class="text-center py-12 bg-white dark:bg-gray-800 rounded-lg">
                    <i class='bx bx-group text-6xl text-gray-400 mb-3'></i>
                    <h3 class="text-lg font-semibold mb-2">No applications yet</h3>
                    <p class="text-gray-500">When candidates apply, they'll appear here</p>
                </div>
            `;
            hasMore = false;
            return;
        }
        
        result.data.forEach(application => {
            container.appendChild(createApplicationCard(application));
        });
        
        hasMore = result.data.length === 20;
        if (hasMore) currentPage++;
        
    } catch (error) {
        console.error('Error loading applications:', error);
        showToast('Failed to load applications', 'error');
    } finally {
        isLoading = false;
    }
}

// ============================================
// Create Application Card
// ============================================
function createApplicationCard(application) {
    const div = document.createElement('div');
    div.className = 'application-card bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden';
    
    const statusColors = {
        'pending': 'status-pending',
        'reviewed': 'status-reviewed',
        'shortlisted': 'status-shortlisted',
        'interview': 'status-interview',
        'accepted': 'status-accepted',
        'rejected': 'status-rejected'
    };
    
    div.innerHTML = `
        <div class="p-5">
            <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                <div class="flex-1">
                    <div class="flex items-center gap-3 flex-wrap mb-2">
                        <h3 class="text-lg font-semibold">${escapeHtml(application.fullName)}</h3>
                        <span class="status-badge ${statusColors[application.status]}">${application.status}</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm text-gray-600 dark:text-gray-400 mb-3">
                        <div><i class='bx bx-envelope'></i> ${escapeHtml(application.email)}</div>
                        ${application.phone ? `<div><i class='bx bx-phone'></i> ${escapeHtml(application.phone)}</div>` : ''}
                        <div><i class='bx bx-calendar'></i> Applied: ${formatDate(application.appliedAt)}</div>
                    </div>
                    
                    ${application.coverLetter ? `
                        <div class="mt-3 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                            <p class="text-sm font-semibold mb-1">Cover Letter:</p>
                            <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-3">${escapeHtml(application.coverLetter.substring(0, 200))}${application.coverLetter.length > 200 ? '...' : ''}</p>
                            ${application.coverLetter.length > 200 ? `<button onclick="showFullCoverLetter('${application._id}')" class="text-xs text-blue-500 mt-1">Read more</button>` : ''}
                        </div>
                    ` : ''}
                    
                    <div class="flex flex-wrap gap-2 mt-4">
                        <button onclick="viewApplicationDetails('${application._id}')" class="px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600">
                            <i class='bx bx-show'></i> View Details
                        </button>
                        <button onclick="updateStatus('${application._id}', 'shortlisted')" class="px-3 py-1.5 bg-purple-500 text-white rounded-lg text-sm hover:bg-purple-600">
                            ⭐ Shortlist
                        </button>
                        <button onclick="openInterviewModal('${application._id}')" class="px-3 py-1.5 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600">
                            📅 Schedule Interview
                        </button>
                        <button onclick="updateStatus('${application._id}', 'accepted')" class="px-3 py-1.5 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600">
                            ✅ Accept
                        </button>
                        <button onclick="updateStatus('${application._id}', 'rejected')" class="px-3 py-1.5 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">
                            ❌ Reject
                        </button>
                        ${application.resume?.url ? `
                            <a href="${application.resume.url}" target="_blank" class="px-3 py-1.5 bg-gray-500 text-white rounded-lg text-sm hover:bg-gray-600">
                                <i class='bx bx-file'></i> Resume
                            </a>
                        ` : ''}
                        <button onclick="openNoteModal('${application._id}', '${escapeHtml(application.employerNotes || '')}')" class="px-3 py-1.5 bg-yellow-500 text-white rounded-lg text-sm hover:bg-yellow-600">
                            <i class='bx bx-note'></i> Add Note
                        </button>
                    </div>
                    
                    ${application.employerNotes ? `
                        <div class="mt-3 p-3 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg">
                            <p class="text-sm font-semibold mb-1">Your Note:</p>
                            <p class="text-sm">${escapeHtml(application.employerNotes)}</p>
                        </div>
                    ` : ''}
                    
                    ${application.interviews?.length > 0 ? `
                        <div class="mt-3">
                            <p class="text-sm font-semibold mb-2">Interview History:</p>
                            ${application.interviews.map(interview => `
                                <div class="text-sm p-2 bg-gray-100 dark:bg-gray-700 rounded mb-1">
                                    <span class="font-medium">${interview.type}:</span> ${new Date(interview.scheduledAt).toLocaleString()}
                                    ${interview.meetingLink ? `<a href="${interview.meetingLink}" target="_blank" class="text-blue-500 ml-2">Join</a>` : ''}
                                    <span class="text-xs text-gray-500 ml-2">(${interview.status})</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            </div>
        </div>
    `;
    
    div.addEventListener('click', (e) => {
        if (!e.target.closest('button') && !e.target.closest('a')) {
            window.location.href = `/application-details.html?id=${application._id}`;
        }
    });
    
    return div;
}

// ============================================
// Application Actions
// ============================================
async function updateStatus(applicationId, status) {
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${applicationId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ status })
        });
        
        if (response.ok) {
            showToast(`Application ${status} successfully!`, 'success');
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error updating status:', error);
        showToast(error.message, 'error');
    }
}

async function updateNote(applicationId, note) {
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${applicationId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ employerNotes: note })
        });
        
        if (response.ok) {
            showToast('Note added successfully!', 'success');
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error adding note:', error);
        showToast(error.message, 'error');
    }
}

// ============================================
// Interview Functions
// ============================================
function openInterviewModal(applicationId) {
    selectedApplicationId = applicationId;
    const modal = document.getElementById('interview-modal');
    modal.classList.add('show');
    
    // Set default datetime (tomorrow at 10 AM)
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(10, 0, 0, 0);
    document.getElementById('interview-datetime').value = tomorrow.toISOString().slice(0, 16);
    document.getElementById('interview-link').value = '';
    document.getElementById('interview-notes').value = '';
}

async function scheduleInterview() {
    if (!selectedApplicationId) return;
    
    const scheduledAt = document.getElementById('interview-datetime').value;
    const type = document.getElementById('interview-type').value;
    const meetingLink = document.getElementById('interview-link').value;
    const notes = document.getElementById('interview-notes').value;
    
    if (!scheduledAt) {
        showToast('Please select date and time', 'error');
        return;
    }
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs/applications/${selectedApplicationId}/interview`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ scheduledAt, type, meetingLink, notes })
        });
        
        if (response.ok) {
            showToast('Interview scheduled successfully!', 'success');
            closeInterviewModal();
            resetAndReload();
        } else {
            const error = await response.json();
            throw new Error(error.error);
        }
    } catch (error) {
        console.error('Error scheduling interview:', error);
        showToast(error.message, 'error');
    }
}

function closeInterviewModal() {
    const modal = document.getElementById('interview-modal');
    modal.classList.remove('show');
    selectedApplicationId = null;
}

// ============================================
// Note Functions
// ============================================
function openNoteModal(applicationId, currentNote) {
    selectedApplicationId = applicationId;
    const modal = document.getElementById('note-modal');
    const noteText = document.getElementById('note-text');
    noteText.value = currentNote;
    modal.classList.add('show');
}

function saveNote() {
    if (!selectedApplicationId) return;
    
    const note = document.getElementById('note-text').value.trim();
    updateNote(selectedApplicationId, note);
    closeNoteModal();
}

function closeNoteModal() {
    const modal = document.getElementById('note-modal');
    modal.classList.remove('show');
    selectedApplicationId = null;
}

// ============================================
// Helper Functions
// ============================================
function viewApplicationDetails(applicationId) {
    window.location.href = `/application-details.html?id=${applicationId}`;
}

function resetAndReload() {
    currentPage = 1;
    hasMore = true;
    loadApplications();
    loadJobInfo();
}

// ============================================
// Setup Event Listeners
// ============================================
function setupEventListeners() {
    // Status filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const status = btn.dataset.status;
            currentStatus = status;
            currentPage = 1;
            hasMore = true;
            
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            loadApplications();
        });
    });
    
    // Interview modal
    document.getElementById('schedule-interview')?.addEventListener('click', scheduleInterview);
    document.getElementById('close-interview-modal')?.addEventListener('click', closeInterviewModal);
    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.addEventListener('click', closeInterviewModal);
    });
    
    // Note modal
    document.getElementById('save-note')?.addEventListener('click', saveNote);
    document.getElementById('close-note-modal')?.addEventListener('click', closeNoteModal);
    document.querySelectorAll('.close-note-modal').forEach(btn => {
        btn.addEventListener('click', closeNoteModal);
    });
    
    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        });
    });
}

// ============================================
// Theme Toggle
// ============================================
function setupThemeToggle() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const modeToggle = document.getElementById('modeToggle');
            if (modeToggle) {
                modeToggle.src = isDark ? '/assets/img/theme_dark.png' : '/assets/img/theme_light.png';
            }
        });
    }
}

// ============================================
// Initialize
// ============================================
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    jobId = urlParams.get('jobId');
    
    if (!jobId) {
        window.location.href = '/my-jobs.html';
        return;
    }
    
    if (!userToken) {
        window.location.href = `/login.html?redirect=/job-applications.html?jobId=${jobId}`;
        return;
    }
    
    await loadSiteSettings();
    await loadCurrentUser();
    await loadJobInfo();
    await loadApplications();
    setupEventListeners();
    setupThemeToggle();
    
    const trigger = document.getElementById('load-more-trigger');
    if (trigger) observer.observe(trigger);
}

// Make functions global
window.updateStatus = updateStatus;
window.openInterviewModal = openInterviewModal;
window.openNoteModal = openNoteModal;
window.viewApplicationDetails = viewApplicationDetails;

init();
</script>
