    function setupEventListeners() {
        // Cart buttons
        const floatingCartBtn = document.getElementById('floating-cart-btn');
        const cartSidebar = document.getElementById('cart-sidebar');
        const closeCart = document.getElementById('close-cart');
        
        if (floatingCartBtn && cartSidebar) {
            floatingCartBtn.addEventListener('click', () => {
                cartSidebar.classList.add('open');
            });
        }
        
        if (closeCart && cartSidebar) {
            closeCart.addEventListener('click', () => {
                cartSidebar.classList.remove('open');
            });
        }
        
        // Checkout
        const checkoutBtn = document.getElementById('checkout-btn');
        if (checkoutBtn) {
            checkoutBtn.addEventListener('click', async () => {
                if (!currentUser) {
                    window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
                    return;
                }
                
                try {
                    const response = await fetch(`${cleanApiUrl}/api/cart/summary`, {
                        headers: { 'Authorization': `Bearer ${userToken}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const stores = data.summary?.stores || [];
                        
                        if (stores.length === 0) {
                            showToast('Your cart is empty', 'error');
                            return;
                        }
                        
                        if (stores.length === 1) {
                            // متجر واحد → اذهب مباشرة للـ checkout
                            window.location.href = `/checkout.html?store=${stores[0].storeId}`;
                        } else {
                            // عدة متاجر → اذهب لصفحة السلة
                            window.location.href = `/cart.html`;
                        }
                    }
                } catch (error) {
                    console.error('Error checking cart:', error);
                    showToast('Failed to load cart', 'error');
                }
            });
        }
        
        // Store controls for owner
        if (isOwner) {
            const editModeBtn = document.getElementById('edit-mode-btn');
            const previewModeBtn = document.getElementById('preview-mode-btn');
            const exitPreviewBtn = document.getElementById('exit-preview-btn');
            
            if (editModeBtn) editModeBtn.addEventListener('click', toggleEditMode);
            if (previewModeBtn) previewModeBtn.addEventListener('click', enterPreviewMode);
            if (exitPreviewBtn) exitPreviewBtn.addEventListener('click', exitPreviewMode);
        }
        
        // Modals
        const productModal = document.getElementById('product-modal');
        const reviewModal = document.getElementById('review-modal');
        
        if (productModal) {
            productModal.addEventListener('click', (e) => {
                if (e.target === productModal) closeProductModal();
            });
        }
        
        if (reviewModal) {
            reviewModal.addEventListener('click', (e) => {
                if (e.target === reviewModal) closeReviewModal();
            });
        }
        
        document.querySelectorAll('.close-modal, .close-review-modal').forEach(btn => {
            btn.addEventListener('click', () => {
                closeProductModal();
                closeReviewModal();
            });
        });
        
        // Global search
        const globalSearch = document.getElementById('global-search');
        if (globalSearch) {
            let searchTimeout;
            globalSearch.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                if (query.length >= 2) {
                    searchTimeout = setTimeout(() => {
                        searchProducts(query);
                    }, 300);
                } else {
                    const resultsDiv = document.getElementById('search-results-global');
                    if (resultsDiv) resultsDiv.classList.add('hidden');
                }
            });
        }
    }
    
    async function searchProducts(query) {
        const resultsDiv = document.getElementById('search-results-global');
        if (!resultsDiv) return;
        
        const filtered = allProducts.filter(p => 
            p.title.toLowerCase().includes(query.toLowerCase()) ||
            p.description?.toLowerCase().includes(query.toLowerCase()) ||
            p.tags?.some(tag => tag.toLowerCase().includes(query.toLowerCase()))
        ).slice(0, 5);
        
        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="p-4 text-center text-gray-500">No products found</div>`;
            resultsDiv.classList.remove('hidden');
            return;
        }
        
        resultsDiv.innerHTML = filtered.map(product => `
            <div class="p-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition border-b dark:border-gray-700 last:border-0"
                 onclick="openProductModal('${product._id}')">
                <div class="flex items-center gap-3">
                    <img src="${product.images?.[0] || '/assets/img/default-product.png'}" class="w-10 h-10 rounded-lg object-cover">
                    <div>
                        <div class="font-medium text-sm">${escapeHtml(product.title)}</div>
                        <div class="text-xs text-gray-500">${product.price} ${storeSettings?.currencySymbol || '$'}</div>
                    </div>
                </div>
            </div>
        `).join('');
        
        if (filtered.length < allProducts.length) {
            resultsDiv.innerHTML += `
                <div class="p-3 text-center text-blue-500 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer"
                     onclick="document.querySelector('[data-section-type=\"products\"]')?.scrollIntoView({behavior:'smooth'})">
                    View all ${allProducts.length} products →
                </div>
            `;
        }
        
        resultsDiv.classList.remove('hidden');
    }

function renderStoreNavigation() {
    const navContainer = document.getElementById('store-nav-menu');
    if (!navContainer) return;
    
    const currentPath = window.location.pathname;
    const isPreview = currentPath.includes('/preview');
    
    // ✅ استخدم nickname أو storeUsername
    const nickname = storeSettings?.nickname || storeUsername;
    const storeBasePath = isPreview ? '/shop/preview' : `/shop/${nickname}`;
    
    let pages = storePages;
    
    if (isPreview && (!pages || pages.length === 0)) {
        loadPreviewPages();
        return;
    }
    
    if (!pages || pages.length === 0) {
        navContainer.style.display = 'none';
        return;
    }
    
    const activePages = pages.filter(page => page.isEnabled !== false);
    
    if (activePages.length === 0) {
        navContainer.style.display = 'none';
        return;
    }
    
    navContainer.style.display = 'block';
    
    const navHtml = `
        <div class="flex overflow-x-auto hide-scrollbar gap-1 pb-2">
            ${activePages.map(page => {
                let pageUrl;
                if (isPreview) {
                    pageUrl = page.slug === 'products' ? '/shop/preview' : `/shop/preview/page/${page.slug}`;
                } else {
                    pageUrl = page.slug === 'products' ? storeBasePath : `${storeBasePath}/${page.slug}`;
                }
                
                const isActive = currentPath === pageUrl || 
                                (page.slug === 'products' && (currentPath === storeBasePath || currentPath === storeBasePath + '/'));
                return `
                    <button 
                        onclick="navigateToPage('${page.slug}')"
                        class="store-nav-link px-4 py-2 text-sm font-medium rounded-lg transition whitespace-nowrap

                        data-slug="${page.slug}">

}

    // Navigate to Page (without reload)
    function navigateToPage(slug) {
        const isPreview = window.location.pathname.includes('/preview');
        let newUrl;
        
        // ✅ بناء الرابط حسب الوضع
        if (isPreview) {
            newUrl = slug === 'products' ? '/shop/preview' : `/shop/preview/page/${slug}`;
        } else {
            const storeBasePath = `/shop/${storeUsername}`;
            newUrl = slug === 'products' ? storeBasePath : `${storeBasePath}/${slug}`;
        }
        
        // منع إعادة التحميل إذا كان الرابط هو نفسه
        if (window.location.pathname === newUrl) return;
        
        // Update browser URL without reload
        window.history.pushState({ pageSlug: slug }, '', newUrl);
        
        // Load page content
        loadPageContent(slug);
        
        // Update active state in navigation
        document.querySelectorAll('.store-nav-link').forEach(link => {
            link.classList.remove('bg-blue-500', 'text-white');
            link.classList.add('text-gray-600', 'dark:text-gray-300');

        if (activeLink) {
            activeLink.classList.add('bg-blue-500', 'text-white');

        }
    }

    /**
     * معالجة الـ Shortcodes في المحتوى
     */
    async function parseShortcodes(content, storeId) {
        if (!content || typeof content !== 'string') return content;
        if (!content.includes('[')) return content;
        
        try {
            const response = await fetch(`${cleanApiUrl}/api/store/shortcodes/parse`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(userToken ? { 'Authorization': `Bearer ${userToken}` } : {})
                },
                body: JSON.stringify({ content, storeId, userToken })
            });
            
            const data = await response.json();
            return data.parsedContent || content;
        } catch (error) {
            console.error('Error parsing shortcodes:', error);
            return content;
        }
    }

    /**
     * معالجة Shortcodes في وصف المنتج
     */
    async function parseProductsShortcodes(products, storeId) {
        if (!products || products.length === 0) return products;
        
        const processedProducts = [];
        
        for (const product of products) {
            let processedDescription = product.description || '';
            if (processedDescription && processedDescription.includes('[')) {
                processedDescription = await parseShortcodes(processedDescription, storeId);
            }
            processedProducts.push({
                ...product,
                description: processedDescription
            });
        }
        
        return processedProducts;
    }

// Handle Routing based on URL
    function handleStoreRouting() {
        const path = window.location.pathname;
        const isPreview = path.includes('/preview');
        
        let slug = 'products';
        
        if (isPreview) {
            // ✅ معالجة routing المعاينة
            if (path !== '/shop/preview' && path !== '/shop/preview/') {
                const parts = path.replace('/shop/preview', '').split('/').filter(p => p);
                if (parts.length > 0) {
                    // لو الرابط /shop/preview/page/about
                    if (parts[0] === 'page' && parts[1]) {
                        slug = parts[1];
                    } else {
                        slug = parts[0];
                    }
                }
            }
        } else {
            // معالجة routing المتجر العادي
            const storeBasePath = `/shop/${storeUsername}`;
            if (path !== storeBasePath && path !== storeBasePath + '/') {
                const parts = path.replace(storeBasePath, '').split('/').filter(p => p);
                if (parts.length > 0) {
                    slug = parts[0];
                }
            }
        }
        
        // Load the page content
        loadPageContent(slug);
        
        // Update active navigation link
        setTimeout(() => {
            const navLinks = document.querySelectorAll('.store-nav-link');
            if (navLinks.length > 0) {
                navLinks.forEach(link => {
                    link.classList.remove('bg-blue-500', 'text-white');
                    if (link.getAttribute('data-slug') === slug) {
                        link.classList.add('bg-blue-500', 'text-white');
                    }
                });
            }
        }, 150);
    }

    // ============================================
    // 🎨 LOAD AND APPLY FULL TEMPLATE - REPLACES ENTIRE PAGE
    // ============================================
    
    let isFullTemplateApplied = false;
    let originalPageContent = null; // لحفظ المحتوى الأصلي للرجوع إليه
    
    async function loadAppliedTemplate() {
        try {
            // 1. جلب رابط القالب من الـ API الجديد
            const response = await fetch(`${cleanApiUrl}/api/store/${storeUsername}/full-template`, {
                headers: userToken ? { 'Authorization': `Bearer ${userToken}` } : {}
            });
            
            if (!response.ok) {
                console.log('No full template API response, using default layout');
                return false;
            }
            
            const data = await response.json();
            
            // 2. إذا لم يكن هناك قالب كامل، اخرج
            if (!data.hasFullTemplate || !data.templateUrl) {
                console.log('No full template applied. Using default layout.');
                return false;
            }
            
            console.log('🎨 Loading full template from:', data.templateUrl);
            showToast('Loading store template...', 'info');
            
            // 3. حفظ المحتوى الأصلي (للرجوع عند الخروج من المعاينة أو التبديل)
            if (!originalPageContent) {
                originalPageContent = document.documentElement.cloneNode(true);
            }
            
            // 4. جلب الـ HTML الكامل للقالب
            const templateResponse = await fetch(data.templateUrl);
            if (!templateResponse.ok) {
                throw new Error(`Failed to fetch template: ${templateResponse.status}`);
            }
            
            let fullHtml = await templateResponse.text();
            
            // 5. معالجة المسارات النسبية في القالب
            //    تحويل src="/images/logo.png" إلى الرابط الكامل من API التحميل
            const templateSlug = data.templateInfo.slug;
            fullHtml = fullHtml.replace(/(src|href)=["'](?!https?:\/\/|data:|#|\/\/)([^"']+)["']/g, 
                `$1="${cleanApiUrl}/api/templates/serve/${templateSlug}/file/$2"`);
            
            // 6. استخراج المحتوى الجديد
            //    - استخراج title
            const titleMatch = fullHtml.match(/<title[^>]*>([^<]*)<\/title>/i);
            if (titleMatch) {
                document.title = titleMatch[1];
            }
            
            //    - استخراج محتوى body
            const bodyMatch = fullHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            let newBodyContent = bodyMatch ? bodyMatch[1] : fullHtml;
            
            //    - إضافة شريط للمالك إذا كان في وضع المعاينة أو التحرير
            if (isOwner && !isPreviewMode) {
                const ownerBar = `
                    <div style="position: sticky; top: 0; z-index: 10000; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
                        <span><i class='bx bx-palette'></i> Template: ${data.templateInfo.name}</span>
                        <div>
                            <button id="exit-full-template-btn" style="background: rgba(255,255,255,0.2); border: none; padding: 4px 12px; border-radius: 20px; color: white; cursor: pointer; margin-right: 8px;">
                                <i class='bx bx-exit'></i> Reset to Default
                            </button>
                            <button id="edit-full-template-btn" style="background: white; border: none; padding: 4px 12px; border-radius: 20px; color: #667eea; cursor: pointer;">
                                <i class='bx bx-edit-alt'></i> Edit Design
                            </button>
                        </div>
                    </div>
                `;
                newBodyContent = ownerBar + newBodyContent;
            }
            
            // 7. استبدال DOM بالكامل
            //    - إزالة جميع الـ event listeners القديمة (عن طريق استبدال الـ body)
            //    - إنشاء body جديد
            const newBody = document.createElement('body');
            newBody.innerHTML = newBodyContent;
            
            //    - نسخ الكلاسات والسمات من الـ body القديم
            const oldBody = document.body;
            for (const attr of oldBody.attributes) {
                if (attr.name !== 'id') {
                    newBody.setAttribute(attr.name, attr.value);
                }
            }
            
            //    - استبدال الـ body
            oldBody.parentNode.replaceChild(newBody, oldBody);
            
            // 8. إضافة CSS من القالب
            const cssMatches = fullHtml.match(/<link[^>]*href=["']([^"']+\.css)["'][^>]*>/gi) || [];
            const styleMatches = fullHtml.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
            
            for (const link of cssMatches) {
                const hrefMatch = link.match(/href=["']([^"']+)["']/);
                if (hrefMatch) {
                    const href = hrefMatch[1];
                    if (!document.querySelector(`link[href="${href}"]`)) {
                        const newLink = document.createElement('link');
                        newLink.rel = 'stylesheet';
                        newLink.href = href;
                        document.head.appendChild(newLink);
                    }
                }
            }
            
            for (const style of styleMatches) {
                const styleContent = style.replace(/<\/?style[^>]*>/gi, '');
                const styleTag = document.createElement('style');
                styleTag.textContent = styleContent;
                document.head.appendChild(styleTag);
            }
            
            // 9. إضافة JavaScript من القالب وتنفيذه
            const scriptMatches = fullHtml.match(/<script[^>]*src=["']([^"']+\.js)["'][^>]*><\/script>/gi) || [];
            for (const script of scriptMatches) {
                const srcMatch = script.match(/src=["']([^"']+)["']/);
                if (srcMatch) {
                    const src = srcMatch[1];
                    if (!document.querySelector(`script[src="${src}"]`)) {
                        const newScript = document.createElement('script');
                        newScript.src = src;
                        document.body.appendChild(newScript);
                    }
                }
            }
            
            // 10. تنفيذ أي كود JS مضمن (inline scripts)
            const inlineScripts = fullHtml.match(/<script[^>]*>([\s\S]*?)<\/script>/gi) || [];
            for (const inlineScript of inlineScripts) {
                if (!inlineScript.includes('src=')) {
                    const scriptContent = inlineScript.replace(/<\/?script[^>]*>/gi, '');
                    if (scriptContent.trim()) {
                        const newScript = document.createElement('script');
                        newScript.textContent = scriptContent;
                        document.body.appendChild(newScript);
                    }
                }
            }
            
            // 11. إضافة أزرار التحكم للمالك (إذا لزم الأمر)
            if (isOwner && !isPreviewMode) {
                setupFullTemplateOwnerControls();
            }
            
            // 12. تحديث المتغيرات العامة
            isFullTemplateApplied = true;
            
            // 13. تحديث سلة التسوق (إعادة تهيئة)
            await updateCartCount();
            await renderCartSidebar();
            
            console.log('✅ Full template applied successfully!');
            showToast('Template applied successfully!', 'success');
            return true;
            
        } catch (error) {
            console.error('Error loading full template:', error);
            showToast('Failed to load template. Using default layout.', 'error');
            return false;
        }
    }

            // ✅ إزالة أي layout classes قديمة
            const layoutClasses = [
                'layout-default', 'layout-sidebar-left', 'layout-sidebar-right', 
                'layout-product-focused', 'layout-minimal', 'layout-magazine',
                'layout-compact', 'layout-dark-store'
            ];
            layoutClasses.forEach(cls => document.body.classList.remove(cls));
            
            // ✅ إضافة الـ layout class الجديد
            document.body.classList.add(`layout-${layoutTemplate}`);
            
            // ✅ تحديث CSS variable لعدد الأعمدة
            if (layoutSettings.productsPerRowDesktop) {
                document.documentElement.style.setProperty('--products-per-row', layoutSettings.productsPerRowDesktop);

            // ✅ طباعة للتأكد (اختياري)
            console.log('✅ Layout template loaded:', layoutTemplate, layoutSettings);

            return layoutTemplate;
            
        } else {
            // Fallback to default
            document.body.classList.add('layout-default');
            return 'default';
        }
    } catch (error) {
        console.error('Error loading layout template:', error);
        document.body.classList.add('layout-default');

    // تخصيص قسم Hero
    if (settings.hideHero) document.body.classList.add('hide-hero');
    if (settings.tallHero) document.body.classList.add('tall-hero');
    if (settings.shortHero) document.body.classList.add('short-hero');
    
    // تخصيص المظهر العام
    if (settings.largeText) document.body.classList.add('large-text');
    if (settings.smallText) document.body.classList.add('small-text');
    if (settings.largeGap) document.body.classList.add('large-gap');
    if (settings.smallGap) document.body.classList.add('small-gap');
    if (settings.widePadding) document.body.classList.add('wide-padding');
    if (settings.narrowPadding) document.body.classList.add('narrow-padding');
    if (settings.fullWidthContent) document.body.classList.add('full-width');
    
    console.log('✅ Layout settings applied:', settings);
}

// دالة لحفظ الإعدادات
function saveLayoutSettings(settings) {
    localStorage.setItem('store_layout_settings', JSON.stringify(settings));
    applyLayoutSettings();
    showToast('✅ Layout settings saved! Refresh to see changes.', 'success');
}

// دالة لإعادة تعيين الإعدادات
function resetLayoutSettings() {
    if (confirm('⚠️ Reset all layout settings to default?')) {
        localStorage.removeItem('store_layout_settings');
        // إزالة كل الكلاسات
        const classes = [
            'hide-header', 'hide-footer', 'hide-navigation', 'hide-owner-stats', 'hide-analytics',
            'full-page-mode', 'sidebar-right', 'sidebar-left', 'single-column', 'two-columns',
            'three-columns', 'four-columns', 'list-view', 'hide-product-images', 'hide-product-prices',
            'hide-product-ratings', 'hide-add-to-cart', 'horizontal-scroll', 'plain-cards',
            'round-cards', 'square-cards', 'hide-store-logo', 'hide-store-description',
            'hide-store-stats', 'hide-store-banner', 'hide-floating-cart', 'hide-store-controls',
            'transparent-header', 'transparent-footer', 'force-dark-mode', 'force-light-mode',
            'hide-hero', 'tall-hero', 'short-hero', 'large-text', 'small-text', 'large-gap',
            'small-gap', 'wide-padding', 'narrow-padding', 'full-width'
        ];
        classes.forEach(c => document.body.classList.remove(c));
        showToast('✅ Layout reset to default!', 'success');
        setTimeout(() => window.location.reload(), 1000);
    }
}

// لو المالك، أضف أزرار تحكم إضافية
if (isOwner && document.getElementById('store-controls')) {
    const controls = document.getElementById('store-controls');
    
    // زر إعادة تعيين التخطيط
    const resetLayoutBtn = document.createElement('button');
    resetLayoutBtn.id = 'reset-layout-btn';
    resetLayoutBtn.className = 'store-control-btn';
    resetLayoutBtn.innerHTML = '<i class="bx bx-reset"></i> Reset Layout';
    resetLayoutBtn.addEventListener('click', resetLayoutSettings);
    controls.appendChild(resetLayoutBtn);
    
    // زر تبديل الهيدر
    const toggleHeaderBtn = document.createElement('button');
    toggleHeaderBtn.id = 'toggle-header-btn';
    toggleHeaderBtn.className = 'store-control-btn';
    toggleHeaderBtn.innerHTML = '<i class="bx bx-hide"></i> Hide Header';
    toggleHeaderBtn.addEventListener('click', () => {
        const isHidden = document.body.classList.toggle('hide-header');
        toggleHeaderBtn.innerHTML = isHidden ? '<i class="bx bx-show"></i> Show Header' : '<i class="bx bx-hide"></i> Hide Header';
        // حفظ الإعداد
        const settings = JSON.parse(localStorage.getItem('store_layout_settings') || '{}');
        settings.hideHeader = isHidden;
        localStorage.setItem('store_layout_settings', JSON.stringify(settings));
    });
    controls.appendChild(toggleHeaderBtn);
    
    // زر تبديل الفوتر
    const toggleFooterBtn = document.createElement('button');
    toggleFooterBtn.id = 'toggle-footer-btn';
    toggleFooterBtn.className = 'store-control-btn';
    toggleFooterBtn.innerHTML = '<i class="bx bx-hide"></i> Hide Footer';
    toggleFooterBtn.addEventListener('click', () => {
        const isHidden = document.body.classList.toggle('hide-footer');
        toggleFooterBtn.innerHTML = isHidden ? '<i class="bx bx-show"></i> Show Footer' : '<i class="bx bx-hide"></i> Hide Footer';
        const settings = JSON.parse(localStorage.getItem('store_layout_settings') || '{}');
        settings.hideFooter = isHidden;
        localStorage.setItem('store_layout_settings', JSON.stringify(settings));
    });
    controls.appendChild(toggleFooterBtn);
}

// تطبيق الإعدادات عند تحميل الصفحة
applyLayoutSettings();


</script>
