<script>
// ============================================
// POST JOB PAGE - Fully Updated
// ============================================

const API_URL = window.ENV?.API_URL || 'https://misty-dust-988c.marklasfar.workers.dev';
const cleanApiUrl = API_URL.replace(/\/$/, '');
let userToken = localStorage.getItem('userToken');
let currentUser = null;
let skills = [];
let isLoggedIn = !!userToken;
let descriptionQuill, requirementsQuill, responsibilitiesQuill;

// ============================================
// Utility Functions
// ============================================

function showToast(message, type = 'success') {
    if (typeof Toastify !== 'undefined') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: 'top',
            position: 'right',
            style: {
                background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6',
                borderRadius: '12px',
                fontFamily: 'Inter, sans-serif'
            }
        }).showToast();
    } else {
        console.log(message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

async function fetchCsrfToken() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
            method: 'GET', 
            credentials: 'include' 
        });
        const data = await response.json();
        return data.csrfToken;
    } catch (error) {
        console.error('Error fetching CSRF token:', error);
        return null;
    }
}

async function fetchWithRefresh(url, options = {}) {
    try {
        let csrfToken = await fetchCsrfToken();
        options.headers = {
            ...options.headers,
            'Authorization': userToken ? `Bearer ${userToken}` : '',
            'X-CSRF-Token': csrfToken || ''
        };
        let response = await fetch(url, { ...options, credentials: 'include' });
        
        if (response.status === 401 && userToken) {
            const refreshed = await refreshToken();
            if (refreshed) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
                response = await fetch(url, options);
            }
        }
        return response;
    } catch (error) {
        console.error('Fetch error:', error);
        throw error;
    }
}

async function refreshToken() {
    try {
        const refreshToken = localStorage.getItem('refreshToken');
        if (!refreshToken) throw new Error('No refresh token');
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/refresh-token`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ refreshToken })
        });
        const data = await response.json();
        if (!response.ok) throw new Error('Refresh failed');
        localStorage.setItem('userToken', data.accessToken || data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        userToken = data.accessToken || data.token;
        return userToken;
    } catch (error) {
        console.error('Refresh error:', error);
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        userToken = null;
        return null;
    }
}

// ============================================
// Load Site Settings
// ============================================
async function loadSiteSettings() {
    try {
        const response = await fetch(`${cleanApiUrl}/api/site-settings`);
        if (response.ok) {
            const data = await response.json();
            const logoImg = document.querySelector('#nav-logo');
            if (logoImg && data.logo) {
                logoImg.src = data.logo;
                logoImg.onerror = () => logoImg.src = '/assets/img/logo.svg';
            }
            const siteNameSpan = document.getElementById('site-name');
            if (siteNameSpan && data.siteName) {
                siteNameSpan.textContent = data.siteName;
            }
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon && data.logo) {
                favicon.href = data.logo;
            }
        }
    } catch (error) {
        console.error('Error loading site settings:', error);
    }
}

// ============================================
// Load Current User & Navbar
// ============================================
async function loadCurrentUser() {
    if (!userToken) {
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
    try {
        const response = await fetchWithRefresh(`${cleanApiUrl}/api/verify-token`);
        if (response.ok) {
            currentUser = await response.json();
            isLoggedIn = true;
            await updateNavbar();
            return currentUser;
        }
        isLoggedIn = false;
        await updateNavbar();
        return null;
    } catch (error) {
        console.error('Error loading current user:', error);
        isLoggedIn = false;
        await updateNavbar();
        return null;
    }
}

async function updateNavbar() {
    const navbarContainer = document.getElementById('navbar-links');
    if (!navbarContainer) return;
    
    if (!isLoggedIn) {
        navbarContainer.innerHTML = `
            <a href="/login.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition px-3 py-2">Sign in</a>
            <a href="/register.html" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">Join now</a>
            <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
                <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
            </button>
        `;
        return;
    }
    
    const userAvatarSrc = currentUser?.profile?.avatar || '/assets/img/default-avatar.png';
    
    navbarContainer.innerHTML = `
        <a href="/feed.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-home text-2xl'></i></a>
        <a href="/network.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-group text-2xl'></i></a>
        <a href="/jobs.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-briefcase text-2xl'></i></a>
        <a href="/messages.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition"><i class='bx bx-message-dots text-2xl'></i></a>
        <div class="relative">
            <button id="profile-menu-btn" class="flex items-center gap-1 text-gray-600 dark:text-gray-300">
                <img src="${userAvatarSrc}" class="w-8 h-8 rounded-full object-cover">
                <i class='bx bx-chevron-down text-xl'></i>
            </button>
            <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg z-50 overflow-hidden">
                <a href="/profile/me" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                <a href="/settings.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Settings</a>
                <a href="/my-jobs.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Jobs</a>
                <a href="/job-applications.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Applications</a>
                <hr class="my-1 dark:border-gray-700">
                <button id="logout-btn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-red-600 transition">Sign Out</button>
            </div>
        </div>
        <button id="theme-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 transition p-2">
            <img id="modeToggle" src="/assets/img/theme_light.png" alt="Theme" style="width: 20px; height: 20px;">
        </button>
    `;
    
    attachNavbarEvents();
}

function attachNavbarEvents() {
    const profileMenuBtn = document.getElementById('profile-menu-btn');
    const profileDropdown = document.getElementById('profile-dropdown');
    if (profileMenuBtn && profileDropdown) {
        profileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });
    }
    
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    document.addEventListener('click', () => {
        if (profileDropdown) profileDropdown.classList.add('hidden');
    });
}

async function handleLogout() {
    try {
        const csrfToken = await fetchCsrfToken();
        await fetch(`${cleanApiUrl}/api/logout`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            }
        });
        localStorage.removeItem('userToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ============================================
// Initialize Quill Editors
// ============================================
function initQuillEditors() {
    descriptionQuill = new Quill('#description-editor', {
        theme: 'snow',
        placeholder: 'Describe the job position, daily tasks, team culture...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });
    
    requirementsQuill = new Quill('#requirements-editor', {
        theme: 'snow',
        placeholder: 'List the qualifications, education, and experience required...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });
    
    responsibilitiesQuill = new Quill('#responsibilities-editor', {
        theme: 'snow',
        placeholder: 'Describe the day-to-day responsibilities...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });
}

// ============================================
// Skills Management
// ============================================
function updateSkillsUI() {
    const container = document.getElementById('skills-container');
    container.innerHTML = skills.map(skill => `
        <span class="skill-tag">
            ${escapeHtml(skill)}
            <button type="button" onclick="removeSkill('${escapeHtml(skill)}')" class="text-red-500 hover:text-red-700">&times;</button>
        </span>
    `).join('');
    document.getElementById('skills').value = JSON.stringify(skills);
}

function removeSkill(skill) {
    skills = skills.filter(s => s !== skill);
    updateSkillsUI();
}

function addSkill() {
    const input = document.getElementById('skill-input');
    const skill = input.value.trim();
    if (skill && !skills.includes(skill)) {
        skills.push(skill);
        updateSkillsUI();
        input.value = '';
    }
}

// ============================================
// Set Default Deadline
// ============================================
function setDefaultDeadline() {
    const deadlineInput = document.getElementById('deadline');
    const defaultDate = new Date();
    defaultDate.setDate(defaultDate.getDate() + 30);
    deadlineInput.value = defaultDate.toISOString().split('T')[0];
}

// ============================================
// Submit Job
// ============================================
async function submitJob(status) {
    // Validate required fields
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const jobType = document.getElementById('job-type').value;
    const experienceLevel = document.getElementById('experience-level').value;
    const location = document.getElementById('location').value.trim();
    const deadline = document.getElementById('deadline').value;
    
    // ✅ Helper function to decode HTML entities
    function decodeHtml(html) {
        if (!html) return '';
        // استخدام createElement لفك التشفير بشكل آمن
        const txt = document.createElement('textarea');
        txt.innerHTML = html;
        return txt.value;
    }
    
    // ✅ فك تشفير المحتوى من Quill
    let description = decodeHtml(descriptionQuill.root.innerHTML);
    let requirements = decodeHtml(requirementsQuill.root.innerHTML);
    let responsibilities = decodeHtml(responsibilitiesQuill.root.innerHTML || '');
    
    // ✅ إزالة أي <p><br></p> فارغة
    if (description === '<p><br></p>' || description === '') {
        description = '';
    }
    if (requirements === '<p><br></p>' || requirements === '') {
        requirements = '';
    }
    
    if (!title || !category || !jobType || !experienceLevel || !location || !deadline) {
        showToast('Please fill in all required fields', 'error');
        return;
    }
    
    if (!description) {
        showToast('Please enter a job description', 'error');
        return;
    }
    
    if (!requirements) {
        showToast('Please enter job requirements', 'error');
        return;
    }
    
    const jobData = {
        title,
        category,
        jobType,
        experienceLevel,
        location,
        isRemote: document.getElementById('remote').checked,
        salaryMin: parseInt(document.getElementById('salary-min').value) || null,
        salaryMax: parseInt(document.getElementById('salary-max').value) || null,
        salaryCurrency: document.getElementById('salary-currency').value,
        isSalaryNegotiable: document.getElementById('salary-negotiable').checked,
        description,
        requirements,
        responsibilities,
        requiredSkills: skills,
        vacancies: parseInt(document.getElementById('vacancies').value) || 1,
        deadline,
        companyName: document.getElementById('company-name').value || null,
        companyWebsite: document.getElementById('company-website').value || null,
        isFeatured: document.getElementById('is-featured').checked,
        status
    };
    
    console.log('Job Data:', jobData); // ✅ للتأكد من البيانات قبل الإرسال
    
    try {
        const csrfToken = await fetchCsrfToken();
        const response = await fetch(`${cleanApiUrl}/api/jobs`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`,
                'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify(jobData)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showToast(status === 'active' ? 'Job posted successfully!' : 'Job saved as draft', 'success');
            setTimeout(() => {
                window.location.href = '/my-jobs.html';
            }, 1500);
        } else {
            throw new Error(result.error || result.message);
        }
    } catch (error) {
        console.error('Error posting job:', error);
        showToast(error.message, 'error');
    }
}
// ============================================
// Setup Event Listeners
// ============================================
function setupEventListeners() {
    // Add skill
    document.getElementById('add-skill')?.addEventListener('click', addSkill);
    document.getElementById('skill-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            addSkill();
        }
    });
    
    // Form submission
    document.getElementById('job-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await submitJob('active');
    });
    
    // Save draft
    document.getElementById('save-draft')?.addEventListener('click', async () => {
        await submitJob('draft');
    });
}

// ============================================
// Theme Toggle
// ============================================
function setupThemeToggle() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
    }
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const modeToggle = document.getElementById('modeToggle');
            if (modeToggle) {
                modeToggle.src = isDark ? '/assets/img/theme_dark.png' : '/assets/img/theme_light.png';
            }
        });
    }
}

// ============================================
// Initialize
// ============================================
async function init() {
    if (!userToken) {
        window.location.href = '/login.html?redirect=/post-job.html';
        return;
    }
    
    await loadSiteSettings();
    await loadCurrentUser();
    
    initQuillEditors();
    setDefaultDeadline();
    setupEventListeners();
    setupThemeToggle();
    
    // Set company name from user profile if available
    if (currentUser?.profile?.portfolioName) {
        document.getElementById('company-name').value = currentUser.profile.portfolioName;
    }
}

// Make functions global
window.removeSkill = removeSkill;

init();
</script>
