<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - MGZon Store</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f3f4f6; }
        body.dark { background: #000000; }
        .loader-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            position: absolute;
            animation: fall 3s linear forwards;
            z-index: 1000;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .order-card {
            transition: all 0.2s ease;
        }
        .order-card:hover {
            transform: translateY(-2px);
        }
        .dark .bg-gray-50 {
            background-color: #111827;
        }
        .dark .border-gray-200 {
            border-color: #374151;
        }
        .dark .text-gray-600 {
            color: #9ca3af;
        }
        .download-btn {
            transition: all 0.2s ease;
        }
        .download-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900">

<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden">
        <!-- Success Header -->
        <div class="bg-gradient-to-r from-green-500 to-green-600 p-8 text-center">
            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class='bx bx-check-double text-green-500 text-5xl'></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">Order Confirmed! 🎉</h1>
            <p class="text-green-100">Thank you for your purchase</p>
        </div>
        
        <!-- Order Details -->
        <div class="p-6">
            <div id="order-details" class="space-y-4">
                <div class="text-center py-8">
                    <div class="loader-spinner mx-auto"></div>
                    <p class="text-gray-500 dark:text-gray-400 mt-3">Loading order details...</p>
                </div>
            </div>
            
            <!-- Download Links Section (shown when order is completed) -->
            <div id="download-section" class="mt-4 hidden">
                <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-4 border border-green-200 dark:border-green-800">
                    <h3 class="font-semibold text-green-700 dark:text-green-400 mb-3 flex items-center gap-2">
                        <i class='bx bx-download text-xl'></i> Download Your Products
                    </h3>
                    <div id="download-links" class="space-y-2">
                        <!-- Will be populated dynamically -->
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6 pt-6 border-t dark:border-gray-700">
                <a href="/" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition text-center">
                    <i class='bx bx-store'></i> Continue Shopping
                </a>
                <a href="/my-orders.html" class="flex-1 bg-gray-500 text-white py-3 rounded-xl font-semibold hover:bg-gray-600 transition text-center">
                    <i class='bx bx-receipt'></i> View My Orders
                </a>
            </div>
            
            <!-- Help Text -->
            <p class="text-xs text-gray-400 dark:text-gray-500 text-center mt-6">
                A confirmation email has been sent to your registered email address.
                <br>You can track your order status in <a href="/my-orders.html" class="text-blue-500">My Orders</a>.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="/assets/js/config.js"></script>
<script>
    // ============================================
    // ORDER CONFIRMATION PAGE - UPDATED WITH DOWNLOADS
    // ============================================
    
    const API_URL = window.ENV?.API_URL || 'https://misty-dust-988c.marklasfar.workers.dev';
    const cleanApiUrl = API_URL.replace(/\/$/, '');
    let userToken = localStorage.getItem('userToken');
    let currentUser = null;
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    
    // ============================================
    // Load Current User
    // ============================================
    async function loadCurrentUser() {
        if (!userToken) {
            const redirect = encodeURIComponent(window.location.pathname + window.location.search);
            window.location.href = `/login.html?redirect=${redirect}`;
            return null;
        }
        try {
            const response = await fetch(`${cleanApiUrl}/api/verify-token`, {
                headers: { 'Authorization': `Bearer ${userToken}` }
            });
            if (response.ok) {
                currentUser = await response.json();
                return currentUser;
            } else {
                localStorage.removeItem('userToken');
                localStorage.removeItem('refreshToken');
                userToken = null;
                const redirect = encodeURIComponent(window.location.pathname + window.location.search);
                window.location.href = `/login.html?redirect=${redirect}`;
                return null;
            }
        } catch (error) {
            console.error('Error loading user:', error);
            return null;
        }
    }
    
    // ============================================
    // Load Order Details
    // ============================================
    async function loadOrder() {
        if (!orderId) {
            document.getElementById('order-details').innerHTML = `
                <div class="text-center py-8">
                    <i class='bx bx-error-circle text-5xl text-red-400 mb-3'></i>
                    <p class="text-red-500 dark:text-red-400">Invalid order ID</p>
                    <a href="/" class="inline-block mt-3 text-blue-500">Go to Home →</a>
                </div>
            `;
            return;
        }
        
        if (!userToken) {
            window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
            return;
        }
        
        try {
            const response = await fetch(`${cleanApiUrl}/api/store/orders/${orderId}`, {
                headers: { 'Authorization': `Bearer ${userToken}` }
            });
            
            if (response.status === 401) {
                window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
                return;
            }
            
            if (response.ok) {
                const order = await response.json();
                renderOrderDetails(order);
                
                // ✅ Show download links if order is completed
                if (order.status === 'completed') {
                    renderDownloadLinks(order);
                }
                
                // Create confetti effect
                createConfetti();
            } else {
                const error = await response.json();
                document.getElementById('order-details').innerHTML = `
                    <div class="text-center py-8">
                        <i class='bx bx-error-circle text-5xl text-red-400 mb-3'></i>
                        <p class="text-red-500 dark:text-red-400">${error.error || 'Order not found'}</p>
                        <a href="/my-orders.html" class="inline-block mt-3 text-blue-500">View My Orders →</a>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error loading order:', error);
            document.getElementById('order-details').innerHTML = `
                <div class="text-center py-8">
                    <i class='bx bx-wifi-off text-5xl text-red-400 mb-3'></i>
                    <p class="text-red-500 dark:text-red-400">Failed to load order details</p>
                    <button onclick="location.reload()" class="inline-block mt-3 text-blue-500">Try Again →</button>
                </div>
            `;
        }
    }
    
    // ============================================
    // Render Download Links (for completed orders)
    // ============================================
    function renderDownloadLinks(order) {
        const section = document.getElementById('download-section');
        const container = document.getElementById('download-links');
        
        const downloadableItems = order.items.filter(item => item.fileUrl);
        
        if (downloadableItems.length === 0) {
            section.classList.add('hidden');
            return;
        }
        
        section.classList.remove('hidden');
        
        container.innerHTML = downloadableItems.map(item => `
            <div class="flex justify-between items-center p-3 bg-white dark:bg-gray-700 rounded-lg border border-green-200 dark:border-green-800">
                <div>
                    <p class="font-medium dark:text-white">${escapeHtml(item.title)}</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400">${item.productType || 'Digital Product'}</p>
                </div>
                <button onclick="downloadFile('${order._id}', '${item.productId}')" 
                    class="download-btn px-4 py-2 bg-green-500 text-white text-sm rounded-lg hover:bg-green-600 transition flex items-center gap-2">
                    <i class='bx bx-download'></i> Download
                </button>
            </div>
        `).join('');
    }
    
    // ============================================
    // Download File
    // ============================================
    window.downloadFile = async function(orderId, productId) {
        try {
            showToast('Preparing download...', 'info');
            const csrfToken = await fetchCsrfToken();
            const response = await fetch(`${cleanApiUrl}/api/store/orders/${orderId}/download/${productId}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${userToken}`,
                    'X-CSRF-Token': csrfToken || ''
                }
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.downloadUrl) {
                    window.open(data.downloadUrl, '_blank');
                    showToast('Download started!', 'success');
                } else {
                    showToast('No download link available', 'error');
                }
            } else {
                const error = await response.json();
                showToast(error.error || 'Failed to download', 'error');
            }
        } catch (error) {
            console.error('Error downloading file:', error);
            showToast('Failed to download file', 'error');
        }
    };
    
    // ============================================
    // Render Order Details (existing function - updated)
    // ============================================
    function renderOrderDetails(order) {
        const orderDate = new Date(order.createdAt);
        const formattedDate = orderDate.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        const currencySymbol = order.currencySymbol || '$';
        const storeName = order.sellerId?.profile?.nickname || order.sellerId?.username || 'Store';
        const sellerUsername = order.sellerId?.username;
        
        // Get payment method display name
        const paymentMethodName = getPaymentMethodName(order.paymentMethod);
        const paymentMethodIcon = getPaymentMethodIcon(order.paymentMethod);
        
        // Get payment details HTML
        const paymentDetailsHtml = getPaymentDetailsHtml(order.paymentMethod, order.paymentDetails);
        
        // Get status badge
        const statusConfig = {
            pending: { text: '⏳ Pending Payment', class: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300' },
            paid: { text: '💰 Paid', class: 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' },
            processing: { text: '⚙️ Processing', class: 'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300' },
            completed: { text: '✅ Completed', class: 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' },
            cancelled: { text: '❌ Cancelled', class: 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' },
            refunded: { text: '🔄 Refunded', class: 'bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-300' }
        };
        const status = statusConfig[order.status] || statusConfig.pending;
        
        const html = `
            <!-- Order Info -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <div class="flex justify-between items-center flex-wrap gap-2">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Order Number</p>
                        <p class="font-mono font-bold text-lg dark:text-white">#${order.orderNumber}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-500 dark:text-gray-400">Placed on</p>
                        <p class="font-medium dark:text-white">${formattedDate}</p>
                    </div>
                </div>
            </div>
            
            <!-- Status -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-500 dark:text-gray-400">Status</span>
                    <span class="px-3 py-1 text-sm rounded-full font-medium ${status.class}">${status.text}</span>
                </div>
            </div>
            
            <!-- Store Info -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center">
                        <i class='bx bx-store text-blue-500 text-xl'></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Sold by</p>
                        <a href="/shop/${sellerUsername}" class="font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                            ${escapeHtml(storeName)}
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Items -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <h3 class="font-semibold dark:text-white mb-3">Items Ordered</h3>
                <div class="space-y-2">
                    ${order.items.map((item, idx) => `
                        <div class="flex justify-between items-center py-2 ${order.items.length > 1 && idx !== order.items.length - 1 ? 'border-b dark:border-gray-700' : ''}">
                            <div>
                                <p class="font-medium dark:text-white">${escapeHtml(item.title)}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">Type: ${item.productType || 'Digital'}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-semibold dark:text-white">${currencySymbol}${(item.price * (item.quantity || 1)).toFixed(2)}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">Qty: ${item.quantity || 1}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="flex justify-between items-center mt-4 pt-3 border-t dark:border-gray-700">
                    <span class="font-semibold dark:text-white">Total</span>
                    <span class="text-2xl font-bold text-blue-600 dark:text-blue-400">${currencySymbol}${order.totalAmount.toFixed(2)}</span>
                </div>
            </div>
            
            <!-- Payment Information -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <div class="flex items-center gap-2 mb-3">
                    <i class='bx bx-credit-card text-purple-500 text-xl'></i>
                    <h3 class="font-semibold dark:text-white">Payment Information</h3>
                </div>
                <div class="flex items-center gap-3 p-3 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-700">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center ${getPaymentMethodBgColor(order.paymentMethod)}">
                        <i class='bx ${paymentMethodIcon} text-xl ${getPaymentMethodTextColor(order.paymentMethod)}'></i>
                    </div>
                    <div>
                        <p class="font-medium dark:text-white">${paymentMethodName}</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">
                            Status: ${order.status === 'pending' ? 'Awaiting Payment' : order.status === 'paid' ? 'Payment Received' : order.status === 'completed' ? 'Completed' : order.status}
                        </p>
                    </div>
                </div>
                ${paymentDetailsHtml}
            </div>
            
            <!-- Payment Instructions -->
            <div class="bg-yellow-50 dark:bg-yellow-900/20 rounded-xl p-4 border border-yellow-200 dark:border-yellow-800">
                <div class="flex items-center gap-2 mb-3">
                    <i class='bx bx-info-circle text-yellow-600 dark:text-yellow-400 text-xl'></i>
                    <h3 class="font-semibold text-yellow-700 dark:text-yellow-400">Payment Instructions</h3>
                </div>
                <p class="text-sm text-gray-700 dark:text-gray-300 mb-2">
                    ${order.status === 'pending' ? 'Please complete the payment using the method you selected during checkout.' : 'Payment has been confirmed. Your order is being processed.'}
                </p>
                <div class="mt-3 p-3 bg-yellow-100 dark:bg-yellow-900/30 rounded-lg text-sm text-yellow-700 dark:text-yellow-300">
                    <i class='bx bx-time'></i>
                    <strong>Important:</strong> ${order.status === 'pending' ? 'Your order will be processed after payment confirmation.' : order.status === 'completed' ? 'You can now download your files from the section below.' : 'The seller will notify you once your order is ready.'}
                </div>
            </div>
            
            <!-- Next Steps -->
            <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 order-card">
                <h3 class="font-semibold dark:text-white mb-3">What's Next?</h3>
                <div class="space-y-3">
                    ${order.status === 'pending' ? `
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center text-xs font-bold">1</div>
                            <div>
                                <p class="font-medium dark:text-white">Complete Payment</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Send payment using the instructions above</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center text-xs font-bold">2</div>
                            <div>
                                <p class="font-medium dark:text-white">Seller Confirmation</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">The seller will confirm your payment</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center text-xs font-bold">3</div>
                            <div>
                                <p class="font-medium dark:text-white">Access Your Purchase</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">For digital products, you'll receive download links</p>
                            </div>
                        </div>
                    ` : order.status === 'completed' ? `
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 flex items-center justify-center text-xs font-bold">✓</div>
                            <div>
                                <p class="font-medium dark:text-white">Order Completed!</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Download your files from the section above</p>
                            </div>
                        </div>
                    ` : `
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center text-xs font-bold">⏳</div>
                            <div>
                                <p class="font-medium dark:text-white">Order is ${order.status}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">The seller is processing your order</p>
                            </div>
                        </div>
                    `}
                </div>
            </div>
            
            <!-- Contact Seller -->
            <div class="text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">Have questions about your order?</p>
                <a href="/messages.html?user=${sellerUsername}" class="text-blue-500 text-sm hover:underline inline-flex items-center gap-1">
                    <i class='bx bx-message-dots'></i> Contact Seller
                </a>
            </div>
        `;
        
        document.getElementById('order-details').innerHTML = html;
    }
    
    // ============================================
    // Helper Functions for Payment Methods
    // ============================================
    function getPaymentMethodName(method) {
        const names = {
            vodafone: 'Vodafone Cash',
            instapay: 'InstaPay',
            paypal: 'PayPal',
            bank: 'Bank Transfer',
            stripe: 'Stripe (Credit Card)'
        };
        return names[method] || method || 'Not specified';
    }
    
    function getPaymentMethodIcon(method) {
        const icons = {
            vodafone: 'bx-mobile-alt',
            instapay: 'bx-transfer-alt',
            paypal: 'bxl-paypal',
            bank: 'bx-bank',
            stripe: 'bx-credit-card'
        };
        return icons[method] || 'bx-money';
    }
    
    function getPaymentMethodBgColor(method) {
        const colors = {
            vodafone: 'bg-blue-100 dark:bg-blue-900/30',
            instapay: 'bg-green-100 dark:bg-green-900/30',
            paypal: 'bg-indigo-100 dark:bg-indigo-900/30',
            bank: 'bg-gray-100 dark:bg-gray-700',
            stripe: 'bg-purple-100 dark:bg-purple-900/30'
        };
        return colors[method] || 'bg-gray-100 dark:bg-gray-700';
    }
    
    function getPaymentMethodTextColor(method) {
        const colors = {
            vodafone: 'text-blue-600 dark:text-blue-400',
            instapay: 'text-green-600 dark:text-green-400',
            paypal: 'text-indigo-600 dark:text-indigo-400',
            bank: 'text-gray-600 dark:text-gray-400',
            stripe: 'text-purple-600 dark:text-purple-400'
        };
        return colors[method] || 'text-gray-600 dark:text-gray-400';
    }
    
    function getPaymentDetailsHtml(method, details) {
        if (!details) return '';
        
        switch(method) {
            case 'vodafone':
                return `
                    <div class="mt-3 p-3 bg-blue-100 dark:bg-blue-900/30 rounded-lg">
                        <p class="text-sm font-semibold dark:text-white">Vodafone Cash Details:</p>
                        <p class="text-sm">Send payment to: <strong class="font-mono">${details.phone || 'N/A'}</strong></p>
                        ${details.transactionId ? `<p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Transaction ID: ${details.transactionId}</p>` : ''}
                    </div>
                `;
            case 'instapay':
                return `
                    <div class="mt-3 p-3 bg-green-100 dark:bg-green-900/30 rounded-lg">
                        <p class="text-sm font-semibold dark:text-white">InstaPay Details:</p>
                        <p class="text-sm">Send payment to: <strong>${details.phone || details.account || 'N/A'}</strong></p>
                    </div>
                `;
            case 'paypal':
                return `
                    <div class="mt-3 p-3 bg-indigo-100 dark:bg-indigo-900/30 rounded-lg">
                        <p class="text-sm font-semibold dark:text-white">PayPal Details:</p>
                        <p class="text-sm">Send payment to: <strong>${details.email || 'N/A'}</strong></p>
                    </div>
                `;
            case 'stripe':
                return `
                    <div class="mt-3 p-3 bg-purple-100 dark:bg-purple-900/30 rounded-lg">
                        <p class="text-sm font-semibold dark:text-white">Stripe Details:</p>
                        <p class="text-sm">Payment processed securely through Stripe</p>
                        ${details.sessionId ? `<p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Session: ${details.sessionId}</p>` : ''}
                    </div>
                `;
            case 'bank':
                return `
                    <div class="mt-3 p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                        <p class="text-sm font-semibold dark:text-white">Bank Transfer Details:</p>
                        <p class="text-sm">Bank: <strong>${details.bankName || 'N/A'}</strong></p>
                        <p class="text-sm">Account Name: <strong>${details.accountName || 'N/A'}</strong></p>
                        <p class="text-sm">Account Number: <strong>${details.accountNumber || 'N/A'}</strong></p>
                        ${details.iban ? `<p class="text-sm">IBAN: <strong>${details.iban}</strong></p>` : ''}
                    </div>
                `;
            default:
                return '';
        }
    }
    
    // ============================================
    // Create Confetti Effect
    // ============================================
    function createConfetti() {
        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 4000);
        }
    }
    
    async function fetchCsrfToken() {
        try {
            const response = await fetch(`${cleanApiUrl}/api/csrf-token`, { 
                method: 'GET', 
                credentials: 'include' 
            });
            const data = await response.json();
            return data.csrfToken;
        } catch (error) {
            return null;
        }
    }
    
    function showToast(message, type = 'success') {
        if (typeof Toastify !== 'undefined') {
            Toastify({
                text: message,
                duration: 3000,
                gravity: 'top',
                position: 'right',
                style: {
                    background: type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'info' ? '#3b82f6' : '#f59e0b',
                    borderRadius: '12px'
                }
            }).showToast();
        } else {
            console.log(message);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function setupThemeToggle() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }
    }
    
    // ============================================
    // Initialize
    // ============================================
    async function init() {
        setupThemeToggle();
        await loadCurrentUser();
        await loadOrder();
    }
    
    init();
</script>
</body>
</html>
